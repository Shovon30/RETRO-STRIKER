  }
  if(pk.phase==='place') cpix('PLACING THE BALL...', 24, '#8fb7c9',1);
  // the kick that could end it all
  if(pk.decider && ['place','aim','power','cwind'].includes(pk.phase) && Math.floor(frames/14)%2){
    ctx.fillStyle='rgba(11,20,32,0.92)'; ctx.fillRect(W/2-36,37,72,10);
    cpix('★ THE DECIDER ★', 39, '#ff5a3d', 1);
  }
  if(pk.phase==='result'||pk.phase==='end'){
    const txt = pk.phase==='end' ? (pk.youWin? 'YOU WIN THE SHOOTOUT!':'THE CPU TAKES IT...') : pk.banner;
    const col = pk.phase==='end' ? (pk.youWin? '#39d98a':'#ff5a3d') : pk.bannerCol;
    const s= pk.phase==='end'?2:3;
    const twd=txt.length*4*s;
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,H/2-18,W,32);
    cpix(txt, H/2-10, col, s);
  }
  if(pk.turn==='cpu'&&pk.phase!=='end') pixText('R'+pk.round+' · CPU SHOOTS', 8, 24, '#ff9a9a',1);
  else if(pk.phase!=='intro'&&pk.phase!=='end') pixText('R'+pk.round+' · YOU SHOOT', 8, 24, '#7fb0ff',1);
  // round flash banner
  if(pk.roundFlash>0 && pk.phase==='aim'){
    pk.roundFlash--;
    const txt = pk.sudden? 'SUDDEN DEATH!' : 'ROUND '+pk.round;
    const s=2, twd=txt.length*4*s;
    ctx.globalAlpha=clamp(pk.roundFlash/25,0,1);
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,64,W,20);
    pixText(txt, W/2-twd/2, 68, pk.sudden?'#ff5a3d':'#ffe84d', s);
    ctx.globalAlpha=1;
  }
}

// ---- game over ----
function overTick(){
  const youWin = gameMode==='pk'? (pk&&pk.youWin) : scoreL>scoreR;
  if(youWin){
    crowdHype=Math.max(crowdHype,5); hypeTeam='L';
    if(titleT%28===0) spawnFirework();
    updateEffects();
  }
}
function drawOver(){
  ctx.fillStyle='rgba(4,10,16,0.78)'; ctx.fillRect(0,0,W,H);
  let res,col;
  const youWin = gameMode==='pk'? pk.youWin : scoreL>scoreR;
  if(youWin){ res='YOU WIN!'; col='#39d98a'; }
  else { res = gameMode==='cup'? 'CUP RUN ENDS' : 'YOU LOSE'; col='#ff5a3d'; }
  // framed result panel — same design language as the pause dialog
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(W/2-117,33,228,196);
  ctx.fillStyle='#0b1624'; ctx.fillRect(W/2-120,30,228,196);
  ctx.strokeStyle=col; ctx.lineWidth=1; ctx.strokeRect(W/2-120.5,29.5,229,197);
  ctx.fillStyle='#102338'; ctx.fillRect(W/2-120,30,228,24);
  // victory fireworks render above the panel
  for(const pt of particles){ ctx.globalAlpha=clamp(pt.life/40,0,1); ctx.fillStyle=pt.c; ctx.fillRect(Math.round(pt.x),Math.round(pt.y),pt.s,pt.s); }
  ctx.globalAlpha=1;
  const hdr = gameMode==='pk'? 'SHOOTOUT OVER' : gameMode==='cup'? 'KNOCKED OUT · '+cup.stages[Math.min(cup.stage,2)] : 'FULL TIME';
  cpix(hdr, 37, '#cfe4f2', hdr.length>15?1:2);
  cpix(homeC.name+'  '+scoreL+' - '+scoreR+'  '+awayC.name, 62, '#ffffff', 1);
  cpix(res, 80, col, 3);
  // divider rule between result and stat sheet
  ctx.fillStyle='#223a52'; ctx.fillRect(W/2-90,106,180,1);
  if(gameMode==='pk'){
    const rounds=Math.max(pk.youArr.length,pk.cpuArr.length);
    pixText('ROUNDS  '+rounds, W/2-40,120,'#9fe8c0',1);
    pixText('SCORED  '+pkScore(pk.youArr), W/2-40,134,'#9fe8c0',1);
    pixText('SAVED   '+pk.cpuArr.filter(v=>!v).length, W/2-40,148,'#9fe8c0',1);
    if(pk.youArr.length>=5 && pk.youArr.every(Boolean)) cpix('★ PERFECT FROM THE SPOT ★', 174, '#ffd83d',1);
  } else {
    pixText('SHOTS   '+stats.shots, W/2-40,120,'#9fe8c0',1);
    pixText('TACKLES '+stats.tackles, W/2-40,134,'#9fe8c0',1);
    pixText('PASSES  '+stats.passes, W/2-40,148,'#9fe8c0',1);
    pixText('TIME    '+Math.floor(matchTime/60)+':'+((matchTime%60<10?'0':'')+matchTime%60), W/2-40,162,'#9fe8c0',1);
    // man of the match: the top scorer
    let mvp=null;
    for(const p of players) if((p.goals||0)>(mvp?mvp.goals:0)) mvp=p;
    if(mvp && mvp.goals>0){
      const t='MVP: '+mvp.name+' ('+(mvp.team==='L'?homeC.code:awayC.code)+') · '+mvp.goals+(mvp.goals>1?' GOALS':' GOAL');
      cpix(t, 186, '#ffd83d', 1);
    }
  }
  if(winStreak>=2) cpix('WIN STREAK '+winStreak+'!', 202, '#ffd83d', 1);
  if(Math.floor(now()/450)%2) cpix('[ENTER] NATIONS · [R] REMATCH · [Q] MENU', 214, '#ffffff', 1);
}

function pixText(str,x,y,col,scale=1){ str=(''+str).toUpperCase(); ctx.fillStyle=col; let cx=Math.round(x);
  for(const ch of str){ const g=FONT[ch]||FONT[' ']; for(let r=0;r<5;r++) for(let c=0;c<3;c++)
    if(g[r][c]==='1') ctx.fillRect(cx+c*scale,Math.round(y)+r*scale,scale,scale); cx+=4*scale; } }
// pixel-perfect centered text (glyph cell is 4*scale wide, last col unused → optical center +0.5*scale)
function cpix(str,y,col,scale=1){ str=''+str;
  pixText(str, W/2 - str.length*2*scale + 0.5*scale, y, col, scale); }

  ballX:Math.round(ball.x),ballY:Math.round(ball.y),owner:ball.owner?ball.owner.team:null});
window.__set=(k,v)=>{ if(k==='state')state=v; if(k==='sel')selIndex=v; if(k==='diff')difficulty=v; };
window.__testShot=(px,py,aimY,pow)=>{ const fw=players.find(p=>p.team==='L'&&p.role==='fw');
  fw.x=px;fw.y=py;fw.vx=fw.vy=0;fw.stun=0;fw.kickCd=0;
  ball.x=px+8;ball.y=py;ball.owner=null;ball.ownerCd=0;ball.vx=ball.vy=0;ball.h=0;ball.vh=0;
  let ax=PITCH.right-px,ay=aimY-py;const m=Math.hypot(ax,ay)||1;ax/=m;ay/=m;
  const speed=3.0+pow*4.0; ball.vx=ax*speed;ball.vy=ay*speed;ball.vh=1.0;ball.ownerCd=16; };
