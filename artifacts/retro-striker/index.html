<script>
"use strict";
/* =========================================================================
   RETRO STRIKER — 16-bit arcade football
   Main match (first to 4) + solo Penalty Shootout (best of 5).
   Fixed-timestep logic: exactly 60 updates/sec on every device & refresh
   rate (the renderer draws as fast as the display allows, gameplay never
   speeds up or slows down).
   Single file, no dependencies.
   ========================================================================= */
const CV = document.getElementById('game');
const ctx = CV.getContext('2d');
const W = 480, H = 300;
CV.width = W; CV.height = H;
ctx.imageSmoothingEnabled = false;

function resize(){
  const pad = 24;
  const aw = window.innerWidth - pad, ah = window.innerHeight - pad;
  let scale = Math.max(1, Math.min(aw / W, ah / H));
  CV.style.width = Math.round(W*scale)+'px';
  CV.style.height = Math.round(H*scale)+'px';
}
window.addEventListener('resize', resize); resize();

// ---------------------------------------------------------------- Utils
const rnd = (a=1,b=0)=> b===0 ? Math.random()*a : a + Math.random()*(b-a);
const rint = (a,b)=> Math.floor(rnd(a,b+1));
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const clamp = (v,a,b)=> v<a?a:v>b?b:v;
const lerp = (a,b,t)=> a+(b-a)*t;
const dist = (ax,ay,bx,by)=> Math.hypot(ax-bx, ay-by);
const now = ()=> performance.now();
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ---------------------------------------------------------------- Audio
let AC=null, master=null, muted=false, crowdGain=null, crowdSrc=null;
function initAudio(){
  if(AC) return;
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.5; master.connect(AC.destination);
    startCrowd();
  }catch(e){ AC=null; }
}
function beep(freq=440, dur=0.08, type='square', vol=0.3, slideTo=null){
  if(!AC||muted) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), AC.currentTime+dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+dur);
  o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime+dur+0.02);
}
function noise(dur=0.2, vol=0.4, hp=400){
  if(!AC||muted) return;
  const n=AC.createBufferSource();
  const buf=AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  n.buffer=buf;
  const f=AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp;
  const g=AC.createGain(); g.gain.value=vol;
  n.connect(f); f.connect(g); g.connect(master); n.start();
}
function startCrowd(){
  if(!AC) return;
  const buf=AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  crowdSrc=AC.createBufferSource(); crowdSrc.buffer=buf; crowdSrc.loop=true;
  const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=420;
  crowdGain=AC.createGain(); crowdGain.gain.value=0.05;
  crowdSrc.connect(f); f.connect(crowdGain); crowdGain.connect(master); crowdSrc.start();
}
function crowdSwell(amount=0.35, time=0.9){
  if(!crowdGain||muted) return;
  const t=AC.currentTime;
  crowdGain.gain.cancelScheduledValues(t);
  crowdGain.gain.setValueAtTime(crowdGain.gain.value, t);
  crowdGain.gain.linearRampToValueAtTime(amount, t+0.05);
  crowdGain.gain.linearRampToValueAtTime(0.05, t+time);
}
// ---------------- chiptune menu music (sequenced square lead + triangle bass) ----------------
const MELODY=[659,0,784,880,0,784,659,0, 523,0,659,0,784,0,659,523,
              659,0,784,880,0,988,880,784, 659,0,523,0,587,659,0,0];
const BASSLN=[131,131,175,175, 196,196,165,165];
let musicStep=0;
function musicPulse(){
  if(!AC||muted) return;
  // MATCH GROOVE: quiet kick/hat/bass pulse under the crowd — energy without fatigue
  if(state==='play' && !paused){
    const s=musicStep;
    if(s%8===0) beep(98,0.1,'sine',0.20,50);            // kick drum
    if(s%8===4) noise(0.04,0.09,3000);                   // snare tick
    if(s%2===1) noise(0.015,0.035,7000);                 // hi-hat
    if(s%4===2){ const b=BASSLN[(s/4)|0]; if(b) beep(b,0.12,'triangle',0.05); }
    musicStep=(musicStep+1)%32; return;
  }
  const menus=['title','mode','diff','select','howto','credits','cup','champion','lineup','over'];
  if(!menus.includes(state)) return;
  const n=MELODY[musicStep];
  if(n) beep(n,0.11,'square',0.055);
  if(musicStep%4===0){ const b=BASSLN[(musicStep/4)|0]; if(b) beep(b,0.22,'triangle',0.075); }
  musicStep=(musicStep+1)%32;
}

const SFX = {
  kick:  ()=>{ beep(220,0.06,'square',0.25,120); noise(0.05,0.15,600); },
  pass:  ()=>{ beep(320,0.05,'triangle',0.2,240); },
  shoot: (p)=>{ beep(180+p*120,0.10,'square',0.32,90); noise(0.06,0.2,500); },
  tackle:()=>{ noise(0.12,0.35,300); beep(140,0.08,'sawtooth',0.2,80); },
  post:  ()=>{ beep(900,0.09,'square',0.3,700); },
  goal:  ()=>{ if(!AC||muted) return;
    beep(220,0.55,'sawtooth',0.22,170);                       // stadium goal horn
    noise(0.14,0.22,2200);                                    // net swish
    const notes=[523,659,784,1046]; notes.forEach((n,i)=> setTimeout(()=>beep(n,0.16,'square',0.32),i*90));
    crowdSwell(0.55,1.5); noise(0.5,0.25,300); },
  ooh:   ()=>{ beep(320,0.35,'triangle',0.2,140); noise(0.28,0.12,300); }, // crowd gasp
  heart: ()=>{ beep(64,0.09,'sine',0.34,50); },               // penalty heartbeat
  miss:  ()=>{ beep(220,0.25,'sawtooth',0.22,90); },
  whistle:(long=false)=>{ beep(1800,long?0.5:0.16,'triangle',0.28); if(long) setTimeout(()=>beep(1600,0.3,'triangle',0.24),120); },
  select:()=>{ beep(660,0.05,'square',0.25); },
  move:  ()=>{ beep(440,0.03,'square',0.15); },
  save:  ()=>{ noise(0.1,0.3,500); beep(300,0.07,'square',0.2,180); },
  count: (n)=>{ beep(n>0? 500: 900, 0.14, 'square', 0.3); },
  glitch:()=>{ noise(0.05,0.12,1200); },
};

// ---------------------------------------------------------------- Countries
const COUNTRIES = [
  { name:'BRAZIL',     code:'BRA', flag:['#009c3b','#ffdf00','#1d3fa0'], kit:{shirt:'#ffdf00',shirt2:'#d9bd00',short:'#1d3fa0',sock:'#009c3b'} },
  { name:'ARGENTINA',  code:'ARG', flag:['#75aadb','#ffffff','#75aadb'], kit:{shirt:'#79b6e8',shirt2:'#4f93cf',short:'#0b2a5b',sock:'#ffffff'} },
  { name:'FRANCE',     code:'FRA', flag:['#1b3fae','#ffffff','#d0202f'], kit:{shirt:'#1b3fae',shirt2:'#132c7c',short:'#ffffff',sock:'#d0202f'} },
  { name:'GERMANY',    code:'GER', flag:['#101010','#d0202f','#ffce00'], kit:{shirt:'#f0f0f0',shirt2:'#c9c9c9',short:'#101010',sock:'#101010'} },
  { name:'ENGLAND',    code:'ENG', flag:['#ffffff','#d0202f','#ffffff'], kit:{shirt:'#ffffff',shirt2:'#d0d0d0',short:'#14224e',sock:'#14224e'} },
  { name:'SPAIN',      code:'ESP', flag:['#aa151b','#f1bf00','#aa151b'], kit:{shirt:'#d3202a',shirt2:'#a3161e',short:'#14224e',sock:'#ffb400'} },
  { name:'ITALY',      code:'ITA', flag:['#009246','#ffffff','#ce2b37'], kit:{shirt:'#1c62b8',shirt2:'#144a8e',short:'#ffffff',sock:'#1c62b8'} },
  { name:'NETHERLANDS',code:'NED', flag:['#ae1c28','#ffffff','#21468b'], kit:{shirt:'#f4791f',shirt2:'#c85e12',short:'#101010',sock:'#f4791f'} },
  { name:'PORTUGAL',   code:'POR', flag:['#046a38','#046a38','#da291c'], kit:{shirt:'#8a1420',shirt2:'#650d16',short:'#046a38',sock:'#8a1420'} },
  { name:'JAPAN',      code:'JPN', flag:['#ffffff','#bc002d','#ffffff'], kit:{shirt:'#14235c',shirt2:'#0d1740',short:'#14235c',sock:'#ffffff'} },
  { name:'NIGERIA',    code:'NGA', flag:['#0f9d58','#ffffff','#0f9d58'], kit:{shirt:'#0f9d58',shirt2:'#0a7040',short:'#ffffff',sock:'#0f9d58'} },
  { name:'MEXICO',     code:'MEX', flag:['#006847','#ffffff','#ce1126'], kit:{shirt:'#0a6b3b',shirt2:'#074f2b',short:'#b01020',sock:'#ffffff'} },
];
// original, nationality-flavoured surnames (invented — not real players)
const NAME_POOL = {
  BRA:['SILVANO','MARRECO','BASTOS','CORADO','NEVES','PALMA','TAVIO','RENZO'],
  ARG:['BRACCO','QUIROGA','SANDOVAL','MOLERO','VARELA','ISLAS','GALVAN','ROMANO'],
  FRA:['MOREAU','BONNET','LEROUX','MARCHAND','GIRARD','FONTAINE','RENAUD','BLAISE'],
  GER:['KELLER','BRANDT','FISCHER','HOFMANN','WERNER','KRAUS','LOWE','STEIN'],
  ENG:['HARLOW','WHITTLE','CARVER','ASHWORTH','BRIGGS','FENTON','LOCKE','MERSON'],
  ESP:['NAVARRO','CASTELL','IBARRA','MORENTE','SALAS','DELGADO','PONS','REYES'],
  ITA:['ROMANI','BARESIO','CONTINI','FALCONE','GRECO','MARINO','VITALE','LUCCHI'],
  NED:['VAN DIJKMAN','BROUWER','KUIPER','MULDER','JANSE','VERHOEF','SMIT','BAKKER'],
  POR:['CARDOSO','FONSECA','MATOS','ABREU','TAVARES','LEITAO','PIRES','RAMOS'],
  JPN:['KUROKI','TANABE','MORIYA','SHIRAI','ASADA','NOMURA','HAYASE','OKADA'],
  NGA:['OKAFOR','ADEBAYO','NWANKWO','ELUEME','BALOGUN','OKOYE','ADANU','IKPEBA'],
  MEX:['CASTRO','MENDEZ','QUINTERO','VILLA','SOLIS','GUERRA','NAVA','CAMACHO'],
};
const SKINS=['#f2c79b','#e7b48a','#c98b60','#a3663f','#7a4a2b'];
const HAIRS=['#1a0f0a','#2a1a10','#3a2416','#050505','#5a3a1a','#111111'];
const GK_KIT_HOME={shirt:'#39d98a',shirt2:'#1f9c60',short:'#0c2a1c',sock:'#0c2a1c'};
const GK_KIT_AWAY={shirt:'#f2c53d',shirt2:'#c79a12',short:'#3a2c05',sock:'#3a2c05'};

// ---------------------------------------------------------------- Difficulty tuning
// Only two levels now. EASY is genuinely gentle.
const DIFFS=['EASY','HARD'];
let difficulty=0;
const TUNE_TBL=[
  { // EASY — beginner friendly: slow, passive CPU, wild CPU shots, fumbling CPU keeper,
    //         strong helper keeper, aim-assisted shooting (see releaseShoot)
    plSpeed:1.24, aiSpeed:0.74, aiShootP:0.007, aiSpread:0.58, aiTackleP:0.015, aiPassP:0.03,
    cpuKeeperSkill:0.14, cpuKeeperReach:0, cpuKeeperFumble:0.45, plKeeperReach:7.0,
    pkGuess:0.25, pkCpuMiss:0.30, pkTelegraph:true, pkSaveP:0.88,
    snatchYou:0.5, snatchCpu:0.004, standoff:true,
  },
  { // HARD — the CPU means business
    plSpeed:1.10, aiSpeed:1.14, aiShootP:0.032, aiSpread:0.16, aiTackleP:0.12, aiPassP:0.06,
    cpuKeeperSkill:0.92, cpuKeeperReach:5.2, cpuKeeperFumble:0, plKeeperReach:2.6,
    pkGuess:0.62, pkCpuMiss:0.06, pkTelegraph:false, pkSaveP:0.70,
    snatchYou:0.22, snatchCpu:0.08, standoff:false,
  },
];
// ---- PIXEL CUP escalating tuning: keeper accuracy & aggression rise each round ----
let cupTuneCache=null;
function refreshCupTune(){ cupTuneCache=null; }
function computeCupTune(){
  const s=cup.stage;                          // 0 QF · 1 SF · 2 FINAL
  const base=TUNE_TBL[difficulty];
  const t=clamp(s*0.5 + difficulty*0.30, 0, 1.12);
  const L=(a,b)=>a+(b-a)*Math.min(t,1);
  return {
    plSpeed: base.plSpeed,
    aiSpeed:        L(0.78,1.30),   // opponents get quicker each round
    aiShootP:       L(0.008,0.042),  // ...shoot more often
    aiSpread:       L(0.58,0.09),    // ...and far more accurately
    aiTackleP:      L(0.02,0.17),    // ...press & tackle harder
    aiPassP:        L(0.03,0.07),
    cpuKeeperSkill: L(0.28,0.93),    // rookie keeper -> elite (beatable) wall
    cpuKeeperReach: L(0.8,5.6),
    cpuKeeperFumble:L(0.34,0),
    plKeeperReach:  L(6.8,3.0),
    pkGuess:base.pkGuess, pkCpuMiss:base.pkCpuMiss, pkTelegraph:base.pkTelegraph, pkSaveP:base.pkSaveP,
    snatchYou:      L(0.5,0.25),
    snatchCpu:      L(0.006,0.095),
    standoff: s===0, tier:s,
  };
}
const TUNE=()=> gameMode==='cup' ? (cupTuneCache||(cupTuneCache=computeCupTune())) : TUNE_TBL[difficulty];

// ---- SHAOLIN MODE: every player wields a kung-fu power (Shaolin Soccer) ----
const SHAOLIN=()=> gameMode==='shaolin';
const POWERS={
  meteor: {name:'METEOR SHOT', short:'METEOR', col:'#ff5a3d'},
  tornado:{name:'TORNADO KICK', short:'TORNADO', col:'#37d9d9'},
  wall:   {name:'IRON WALL',    short:'WALL',   col:'#c0c8d0'},
  flash:  {name:'LIGHTNING',    short:'DASH',   col:'#ffe84d'},
  quake:  {name:'EARTHQUAKE',   short:'QUAKE',  col:'#d08a3a'},
  gloves: {name:'GOLDEN GLOVES',short:'KEEPER', col:'#ffd83d'},
};

// ---------------------------------------------------------------- Field geometry
const PITCH = { top: 50, bottom: H-14, left: 22, right: W-22 };
PITCH.cy = (PITCH.top+PITCH.bottom)/2;
PITCH.cx = (PITCH.left+PITCH.right)/2;
const GOAL_H = 62, GOAL_DEPTH = 12;
const goalTop=()=>PITCH.cy-GOAL_H/2, goalBot=()=>PITCH.cy+GOAL_H/2;
const BOX_W = 66, BOX_H = 128;

// ---------------------------------------------------------------- Game state
const WIN_GOALS = 4;
// states: title | howto | credits | mode | diff | select | cup | champion | lineup | count | play | pk | over
let state='title';
let gameMode='main';            // 'main' | 'pk' | 'cup'
// ---- PIXEL CUP tournament ----
let cup={ stage:0, stages:['QUARTER-FINAL','SEMI-FINAL','THE FINAL'], opponents:[], results:[] };
function setupCup(){
  cup.stage=0; cup.results=[];
  const pool=shuffle(COUNTRIES.filter(c=>c!==homeC));
  cup.opponents=[pool[0],pool[1],pool[2]];
  awayC=cup.opponents[0];
}
// cup rounds are shorter; the final is a showdown
function goalTarget(){ return gameMode==='cup'? (cup.stage>=2?3:2) : WIN_GOALS; }
let paused=false, pauseSel=0;
let menuSel=0, modeSel=0, diffSel=0, setSel=0, fxScan=true, fxShake=true;
let scoreL=0, scoreR=0;
let matchTime=0;
let shake=0, flash=0, fade=0, hitstop=0;
let goalBulge={side:null,t:0};   // net ripple on a goal
let celebrate=0, celebrateText='', celebrateTeam='L', celebrateName='';
let _celebScorer=null, _celebSlideUntil=0;   // post-goal celebration actors
let resetTimer=0, pendingOver=false;
let particles=[], ballTrail=[];
let floaters=[], floaterCd=0;
let winStreak=0;
let crowdHype=0;                     // >0: the crowd jumps & camera flashes pop
let hypeTeam='L';                    // whose coach celebrates (the other one slumps)
let ref={active:false,x:0,y:0,t:0,armUp:false};   // the kickoff referee
let stats={shots:0,tackles:0,passes:0};
function spawnFloater(x,y,txt,col){
  if(floaterCd>0) return; floaterCd=45;
  floaters.push({x:clamp(x,50,W-50), y:clamp(y,PITCH.top+10,H-20), txt, col, life:60});
}
let titleT=0, selIndex=0, lineupT=0, countT=0, countN=3;
let homeC=COUNTRIES[0], awayC=COUNTRIES[1];
let JERSEY={};

// ---------------------------------------------------------------- Entities
function mkPlayer(team, role, x, y){
  return { team, role, x, y, vx:0, vy:0, fx:1, fy:0, homeX:x, homeY:y,
    r:6.2, controlled:false, kickCd:0, tackleCd:0, stun:0, anim:0, holdT:0, fumbleT:0,
    baseSpeed: role==='gk'?0.92:1.0, name:'', num:0, skin:SKINS[0], hair:HAIRS[0],
    power:null, goals:0, specialCd:0, charge:0, superFx:0 };
}
let players=[];
let ball={ x:PITCH.cx, y:PITCH.cy, vx:0, vy:0, r:2.8, owner:null, ownerCd:0, spin:0, h:0, vh:0, stretch:0, meteor:0 };
let controlledIndex=-1;

function formation(team){
  const L=PITCH.left,R=PITCH.right,cy=PITCH.cy,cx=PITCH.cx;
  const spots=[
    {role:'gk', x:L+14, y:cy},
    {role:'df', x:L+(cx-L)*0.42, y:cy-42},
    {role:'mf', x:L+(cx-L)*0.75, y:cy+40},
    {role:'fw', x:cx-30, y:cy},
  ];
  if(team==='L') return spots;
  return spots.map(s=>({role:s.role, x:(PITCH.left+PITCH.right)-s.x, y:s.y}));
}
function buildMatch(){
  JERSEY = {
    L:{ ...homeC.kit }, R:{ ...awayC.kit },
    gkL:{ ...GK_KIT_HOME }, gkR:{ ...GK_KIT_AWAY },
  };
  setupTeams();
  assignRoster('L', homeC);
  assignRoster('R', awayC);
  assignPowers();
  players.forEach(p=>{ p.goals=0; p.specialCd=0; p.charge=0; p.superFx=0; });
  scoreL=0; scoreR=0; matchTime=0; pendingOver=false;
  stats={shots:0,tackles:0,passes:0};
  if(gameMode==='cup') refreshCupTune();
}
function assignPowers(){
  if(gameMode!=='shaolin'){ players.forEach(p=>p.power=null); return; }
  for(const team of ['L','R']){
    const list=players.filter(p=>p.team===team);
    list.find(p=>p.role==='gk').power='gloves';
    const outs=shuffle(list.filter(p=>p.role!=='gk'));
    const pool=shuffle(['meteor','tornado','wall','flash','quake']);
    outs.forEach((p,i)=>p.power=pool[i]);
  }
}
function assignRoster(team, country){
  const pool = shuffle(NAME_POOL[country.code]);
  const nums = shuffle([2,4,5,6,7,8,9,10,11,14,17,20]);
  const list = players.filter(p=>p.team===team);
  const order = ['gk','df','mf','fw'];
  let ni=0;
  for(const role of order){
    const p = list.find(pl=>pl.role===role);
    p.name = pool[ni % pool.length];
    p.num  = role==='gk'? 1 : nums[ni];
    p.skin = pick(SKINS); p.hair = pick(HAIRS);
    ni++;
  }
}
function setupTeams(){
  players=[];
  formation('L').forEach(s=> players.push(mkPlayer('L',s.role,s.x,s.y)));
  formation('R').forEach(s=> players.push(mkPlayer('R',s.role,s.x,s.y)));
}
function kickoff(){
  const spotsL=formation('L'), spotsR=formation('R');
  players.filter(p=>p.team==='L').forEach((p,i)=>{ p.x=spotsL[i].x; p.y=spotsL[i].y; p.homeX=spotsL[i].x; p.homeY=spotsL[i].y; p.vx=p.vy=0; p.stun=0; });
  players.filter(p=>p.team==='R').forEach((p,i)=>{ p.x=spotsR[i].x; p.y=spotsR[i].y; p.homeX=spotsR[i].x; p.homeY=spotsR[i].y; p.vx=p.vy=0; p.stun=0; });
  ball.x=PITCH.cx; ball.y=PITCH.cy; ball.vx=0; ball.vy=0; ball.owner=null; ball.ownerCd=20; ball.h=0; ball.vh=0;

const keys={};
const KEYMAP={
  ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',

function setState(s){ state=s; fade=1; }
function toggleSetting(i){
  if(i===0){ muted=!muted; if(crowdGain)crowdGain.gain.value=muted?0:0.05; }
  else if(i===1){ fxScan=!fxScan; document.documentElement.style.setProperty('--scan', fxScan?'rgba(0,0,0,0.14)':'rgba(0,0,0,0)'); }
  else { fxShake=!fxShake; }

}

function keydownEdge(k){
  if(k==='mute'){ muted=!muted; if(crowdGain)crowdGain.gain.value=muted?0:0.05; return; }

  if(state==='title'){
    if(k==='up'){ menuSel=(menuSel+3)%4; SFX.move(); }
    if(k==='down'){ menuSel=(menuSel+1)%4; SFX.move(); }
    if(k==='start'||k==='shoot'){
      SFX.select();
      if(menuSel===0) setState('mode');
      else if(menuSel===1) setState('howto');
      else if(menuSel===2) setState('settings');
      else setState('credits');
    }
    return;
  }
  if(state==='howto'||state==='credits'){
    if(k==='start'||k==='esc'||k==='shoot'){ SFX.select(); setState('title'); }
    return;
  }
  if(state==='settings'){
    if(k==='up'){ setSel=(setSel+2)%3; SFX.move(); }
    if(k==='down'){ setSel=(setSel+1)%3; SFX.move(); }
    if(k==='left'||k==='right'||k==='start'||k==='shoot'){ toggleSetting(setSel); }
    if(k==='esc'){ SFX.select(); setState('title'); }
    return;
  }
  if(state==='mode'){
    if(k==='right' && modeSel%2===0){ modeSel++; SFX.move(); }
    else if(k==='left' && modeSel%2===1){ modeSel--; SFX.move(); }
    else if(k==='down' && modeSel<2){ modeSel+=2; SFX.move(); }
    else if(k==='up' && modeSel>=2){ modeSel-=2; SFX.move(); }
    if(k==='esc'){ SFX.select(); setState('title'); }
    if(k==='start'||k==='shoot'){ gameMode=['main','pk','cup','shaolin'][modeSel]; SFX.select(); setState('diff'); }
    return;
  }
  if(state==='cup'){
    if(k==='start'||k==='shoot'){ awayC=cup.opponents[cup.stage]; buildMatch(); lineupT=0; SFX.select(); setState('lineup'); }
    if(k==='esc'){ SFX.select(); setState('select'); }
    return;
  }
  if(state==='champion'){
    if(k==='start'||k==='shoot'||k==='quit'||k==='esc'){ SFX.select(); setState('title'); }
    if(k==='restart'){ setupCup(); SFX.select(); setState('cup'); }
    return;
  }
  if(state==='diff'){
    if(k==='left'||k==='right'||k==='up'||k==='down'){ diffSel=1-diffSel; SFX.move(); }
    if(k==='esc'){ SFX.select(); setState('mode'); }
    if(k==='start'||k==='shoot'){ difficulty=diffSel; SFX.select(); setState('select'); }
    return;
  }
  if(state==='select'){
    const cols=4;
    if(k==='left'){ selIndex=(selIndex+COUNTRIES.length-1)%COUNTRIES.length; SFX.move(); }
    if(k==='right'){ selIndex=(selIndex+1)%COUNTRIES.length; SFX.move(); }
    if(k==='up'){ selIndex=(selIndex+COUNTRIES.length-cols)%COUNTRIES.length; SFX.move(); }
    if(k==='down'){ selIndex=(selIndex+cols)%COUNTRIES.length; SFX.move(); }
    if(k==='esc'||k==='quit'){ SFX.select(); setState('diff'); }
    if(k==='start'||k==='shoot'){ confirmCountry(); }
    return;
  }
  if(state==='lineup'){
    if(k==='start'||k==='shoot'){ SFX.whistle(false); beginCountdown(); }
    if(k==='esc'){ setState('select'); }
    return;
  }
  if(state==='count'){ return; }

  if(state==='pk'){
    if(paused){ pauseKeys(k); return; }
    if(k==='esc'){ paused=true; pauseSel=0; SFX.select(); return; }
    if(k==='restart'){ rematch(); return; }
    pkKey(k);
    return;
  }

  if(state==='play'){
    if(paused){ pauseKeys(k); return; }
    if(k==='esc'){ paused=true; pauseSel=0; SFX.select(); return; }
    if(k==='restart'){ rematch(); return; }
    if(k==='pass') doPassOrTackle();
    return;
  }
  if(state==='over'){
    if(k==='start'){ SFX.select(); setState('select'); }
    if(k==='restart'){ rematch(); }
    if(k==='quit'||k==='esc'){ setState('title'); }
    return;
  }
}
function pauseKeys(k){
  if(k==='up'){ pauseSel=(pauseSel+3)%4; SFX.move(); }
  if(k==='down'){ pauseSel=(pauseSel+1)%4; SFX.move(); }
  if(k==='start'||k==='shoot'){ activatePause(); }
  if(k==='esc'){ paused=false; SFX.select(); }
  if(k==='restart'){ rematch(); }
  if(k==='quit'){ setState('title'); paused=false; }
}
function activatePause(){
  if(pauseSel===0){ paused=false; SFX.select(); }
  else if(pauseSel===1){ rematch(); }
  else if(pauseSel===2){ setState('select'); paused=false; }
  else { setState('title'); paused=false; }
}
function confirmCountry(){
  homeC = COUNTRIES[selIndex];

  awayC = COUNTRIES[idx];
  buildMatch();

function beginCountdown(){ countN=3; countT=0; setState('count');

function rematch(){

  else { buildMatch(); beginCountdown(); }
}

// touch controls
(function touchSetup(){
  const dpad=document.getElementById('dpad');
  function dirFromTouch(t){
    const r=dpad.getBoundingClientRect();
    const dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
    if(Math.abs(dx)>Math.abs(dy)) return dx<0?'left':'right';
    return dy<0?'up':'down';
  }
  function setFromTouch(t){
    const r=dpad.getBoundingClientRect();
    const dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2), dead=14;
    keys.up=dy<-dead; keys.down=dy>dead; keys.left=dx<-dead; keys.right=dx>dead;
  }
  function clearDir(){ keys.up=keys.down=keys.left=keys.right=false; }
  dpad.addEventListener('touchstart',e=>{e.preventDefault();initAudio();
    if(state==='play'&&!paused){ setFromTouch(e.touches[0]); }
    else { keydownEdge(dirFromTouch(e.touches[0])); }
  },{passive:false});
  dpad.addEventListener('touchmove',e=>{e.preventDefault();if(state==='play'&&!paused)setFromTouch(e.touches[0]);},{passive:false});
  dpad.addEventListener('touchend',e=>{e.preventDefault();clearDir();},{passive:false});
  const bShoot=document.getElementById('bShoot');
  bShoot.addEventListener('touchstart',e=>{e.preventDefault();initAudio();
    if(state==='play'&&!paused){keys.shoot=true;}
    else keydownEdge('start');
  },{passive:false});
  bShoot.addEventListener('touchend',e=>{e.preventDefault();if(state==='play'){releaseShoot();keys.shoot=false;}},{passive:false});
  const bPass=document.getElementById('bPass');
  bPass.addEventListener('touchstart',e=>{e.preventDefault();initAudio();
    if(state==='play'&&!paused)doPassOrTackle(); else if(state==='pk'&&!paused)pkKey('shoot');},{passive:false});
  const bSprint=document.getElementById('bSprint');
  bSprint.addEventListener('touchstart',e=>{e.preventDefault();keys.sprint=true;},{passive:false});
  bSprint.addEventListener('touchend',e=>{e.preventDefault();keys.sprint=false;},{passive:false});
})();

// ---------------------------------------------------------------- Shooting / passing (match)
let charging=false, chargeStart=0, chargePow=0;
function releaseShoot(){
  if(state!=='play'||paused){ charging=false; return; }
  const c=players[controlledIndex];
  if(!charging){ return; }
  charging=false;
  const pow=Math.max(0.25, chargePow); chargePow=0;
  if(!c || ball.owner!==c) return;
  const goalX=PITCH.right;
  let iy=(keys.down?1:0)-(keys.up?1:0);
  // EASY aim assist: a plain shot auto-picks a corner so beginners still score
  if(iy===0 && difficulty===0) iy=(rnd()<0.5?-1:1)*0.85;
  const targetY = PITCH.cy + iy*(GOAL_H*0.5 - 4);
  let ax=goalX-c.x, ay=targetY-c.y; const m=Math.hypot(ax,ay)||1; ax/=m; ay/=m;
  let speed=3.6 + pow*4.6;   // FIFA-style driven strike — quick off the boot
  let meteor=false;
  if(SHAOLIN()){ speed+=2.2; if(c.power==='meteor'){ speed+=2.6; meteor=true; } }  // kung-fu power shots
  setToucher(c);
  // low, driven trajectory — stays under the bar even at full power from close range
  ball.vx=ax*speed; ball.vy=ay*speed; ball.vh=0.5+pow*0.8; ball.stretch=5;
  if(pow>0.72) hitstop=Math.max(hitstop,2);   // impact freeze on a powerful strike
  ball.owner=null; ball.ownerCd=16; c.kickCd=12;
  if(meteor){ ball.meteor=32; shake=Math.max(shake,6); spawnFloater(c.x,c.y-16,'METEOR SHOT!',POWERS.meteor.col); }
  else if(SHAOLIN()){ ball.meteor=22; }        // every Shaolin strike is a fireball
  if(SHAOLIN()) for(let i=0;i<8;i++) particles.push({x:c.x+c.fx*6,y:c.y,vx:c.fx*rnd(0.5,2)+rnd(-0.5,0.5),vy:rnd(-1,1),g:0,life:rnd(8,16),c:pick(['#ff5a3d','#ffd83d','#ff8a3d']),s:2});
  SFX.shoot(pow); stats.shots++; spawnKickDust(c.x,c.y);
}
function doPassOrTackle(){
  const c=players[controlledIndex]; if(!c) return;
  if(SHAOLIN() && c.charge>=1){ superMove(c); return; }   // SUPER! (charged)
  if(ball.owner===c){
    let best=null,bestScore=-1e9;
    for(const p of players){ if(p.team!=='L'||p===c||p.role==='gk') continue;
      const d=dist(c.x,c.y,p.x,p.y); if(d<12) continue;
      const score=(p.x-c.x)*1.2 - d*0.5 - Math.abs(p.y-c.y)*0.2;
      if(score>bestScore){bestScore=score;best=p;} }
    let tx,ty;
    if(best){ tx=best.x+best.vx*12; ty=best.y+best.vy*12; } else { tx=c.x+80; ty=c.y; }  // lead the runner
    let ax=tx-c.x, ay=ty-c.y; const m=Math.hypot(ax,ay)||1; ax/=m;ay/=m;
    const d=best?dist(c.x,c.y,best.x,best.y):90;
    const speed=clamp(2.2+d*0.04,2.8,5.8);            // crisper, distance-weighted pass
    setToucher(c);
    ball.vx=ax*speed; ball.vy=ay*speed; ball.vh=0.5;
    ball.owner=null; ball.ownerCd=14; c.kickCd=10; SFX.pass(); stats.passes++;
  } else {
    if(SHAOLIN() && (c.power==='tornado'||c.power==='quake') && c.specialCd<=0){ shaolinSpecial(c); return; }
    if(c.tackleCd>0) return;
    c.tackleCd=28; c.vx+=c.fx*2.4; c.vy+=c.fy*2.4; SFX.tackle();
    if(ball.owner && ball.owner.team==='R'){
      const d=dist(c.x,c.y,ball.owner.x,ball.owner.y);
      if(d<16){ ball.owner.stun=18; ball.owner=null; ball.ownerCd=10;
        ball.vx=c.fx*1.6+rnd(-0.6,0.6); ball.vy=c.fy*1.6+rnd(-0.6,0.6);
        stats.tackles++; spawnKickDust(c.x,c.y); hitstop=Math.max(hitstop,2);
        spawnFloater(c.x, c.y-16, 'STOLEN!', '#ffe84d'); } }
  }
}
// ---- SUPER MOVES (fully charged) — one per power ----
function superMove(c){
  c.charge=0; c.superFx=18; flash=Math.max(flash,0.6); shake=Math.max(shake,7); hitstop=Math.max(hitstop,3);
  const col=POWERS[c.power]?POWERS[c.power].col:'#ffe84d';
  const nm={meteor:'ROCKET SHOT!',tornado:'SUPER CYCLONE!',quake:'MEGA QUAKE!',wall:'FORCE FIELD!',flash:'LIGHTNING DASH!'}[c.power]||'SUPER!';
  spawnFloater(c.x,c.y-18,nm,col);
  spawnShockwave(c.x,c.y,col,54);
  const goalX = c.team==='L'? PITCH.right : PITCH.left;
  if(c.power==='meteor'){
    if(ball.owner===c){                                   // guaranteed unstoppable rocket
      let ax=goalX-c.x, ay=(PITCH.cy+rnd(-GOAL_H*0.4,GOAL_H*0.4))-c.y; const m=Math.hypot(ax,ay)||1; ax/=m;ay/=m;
      setToucher(c); ball.vx=ax*11; ball.vy=ay*11; ball.vh=0.6; ball.meteor=40; ball.stretch=6;
      ball.owner=null; ball.ownerCd=16; c.kickCd=12; SFX.shoot(1); stats.shots++;
    } else { c.vx+=c.fx*7; c.vy+=c.fy*7; ball.meteor=20; }  // fiery charge
  } else if(c.power==='flash'){
    c.x=clamp(c.x+c.fx*64, PITCH.left+c.r, PITCH.right-c.r); c.y=clamp(c.y+c.fy*64, PITCH.top+2, PITCH.bottom-2);
    for(let i=0;i<10;i++) particles.push({x:c.x-c.fx*i*6,y:c.y-c.fy*i*6,vx:0,vy:0,g:0,life:12,c:'rgba(255,232,77,0.5)',s:3});
    if(dist(c.x,c.y,ball.x,ball.y)<16 && (!ball.owner||ball.owner.team!==c.team)){ ball.owner=c; setToucher(c); }
  } else {
    const R = c.power==='quake'?66 : c.power==='wall'?62 : 74;   // giant radius
    for(const q of players){ if(q.team===c.team) continue; const d=dist(c.x,c.y,q.x,q.y);
      if(d<R){ const a=Math.atan2((q.y-c.y)||rnd(-1,1),(q.x-c.x)||rnd(-1,1));
        q.vx+=Math.cos(a)*6.5; q.vy+=Math.sin(a)*6.5; q.stun=c.power==='quake'?46:30;
        if(ball.owner===q){ ball.owner=null; ball.ownerCd=10; ball.vx=Math.cos(a)*2; ball.vy=Math.sin(a)*2; setToucher(c); } } }
  }
  SFX.tackle();
}
// Shaolin kung-fu shockwave: knock nearby opponents back & steal the ball in radius
function shaolinSpecial(c){
  c.specialCd=48;
  const quake=c.power==='quake';
  const R=quake?40:46, col=POWERS[c.power].col;
  spawnShockwave(c.x,c.y,col,R);
  SFX.tackle(); shake=Math.max(shake,5);
  spawnFloater(c.x,c.y-16, quake?'EARTHQUAKE!':'TORNADO KICK!', col);
  for(const q of players){
    if(q.team===c.team) continue;
    const d=dist(c.x,c.y,q.x,q.y);
    if(d<R){
      const a=Math.atan2((q.y-c.y)||rnd(-1,1),(q.x-c.x)||rnd(-1,1));
      q.vx+=Math.cos(a)*4.4; q.vy+=Math.sin(a)*4.4; q.stun=quake?34:22;
      if(ball.owner===q){ ball.owner=null; ball.ownerCd=10;
        ball.vx=Math.cos(a)*2; ball.vy=Math.sin(a)*2; setToucher(c); }
    }
  }
}
function spawnShockwave(x,y,col,r){
  const n=22;
  for(let i=0;i<n;i++){ const a=i/n*6.283, sp=r*0.12;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,g:0,life:15,c:col,s:2}); }
  particles.push({x,y,vx:0,vy:0,g:0,life:13,c:col,s:3});
}

// ---------------------------------------------------------------- Fixed-timestep loop
// Logic is stepped at EXACTLY 60Hz regardless of the display refresh rate
// (30Hz phone, 60Hz laptop, 144Hz gaming monitor — identical gameplay).
const STEP=1000/60, MAX_FRAME=100;
let lastT=now(), acc=0;
function loop(){
  const t=now(); let dt=t-lastT; lastT=t;
  if(dt>MAX_FRAME)dt=MAX_FRAME;      // avoid spiral-of-death on tab switch
  acc+=dt;
  while(acc>=STEP){
    stepGlobal();
    if(state==='play'&&!paused) tick();
    else if(state==='pk'&&!paused) pkTick();
    else if(state==='count') countdownTick();
    else if(state==='lineup') lineupT++;
    else if(state==='champion') championTick();
    else if(state==='over'){ titleT++; overTick(); }
    else titleT++;
    acc-=STEP;
  }
  render();
  requestAnimationFrame(loop);
}
let frames=0;
function stepGlobal(){ frames++; if(fade>0){ fade-=0.06; if(fade<0)fade=0; }
  if(frames%9===0) musicPulse(); }

function countdownTick(){
  countT++;
  if(countT % 44 === 0){ countN--; SFX.count(countN);
    if(countN===0) ref.armUp=true;                 // ref raises the whistle arm
    if(countN<0){ startPlay(); } }
  else if(countT===1){ SFX.count(countN); }
}
function startPlay(){ kickoff(); state='play'; matchTime=0;
  ref.active=true; ref.t=0; ref.armUp=true;
  SFX.whistle(true);                               // the ref's long kickoff whistle
  crowdSwell(0.35,1.0); }

let timeAccMs=0;
function tick(){
  if(hitstop>0){ hitstop--; return; }             // impact frame-freeze (2-3f)
  if(resetTimer>0){ resetTimer--; celebTick(); updateEffects();
    if(resetTimer===0){ if(pendingOver){ endMatch(); } else kickoff(); }
    return; }
  // SHAOLIN: every player charges a super move through the match
  if(SHAOLIN()){ for(const p of players){ if(p.charge<1) p.charge=Math.min(1,p.charge+0.0016); if(p.superFx>0)p.superFx--; } }
  timeAccMs+=STEP;
  if(timeAccMs>=1000){ timeAccMs-=1000; matchTime++; }
  // terrace chants: clap-clap-clap ... clap-clap, the crowd breathing with the game
  if(frames%840===400 && !muted && AC){
    for(let i=0;i<3;i++) setTimeout(()=>noise(0.09,0.3,900), i*185);
    setTimeout(()=>{ noise(0.09,0.3,900); setTimeout(()=>noise(0.09,0.3,900),185); }, 3*185+230);
    crowdSwell(0.16,1.8);
  }
  updateControlled();
  if(keys.shoot && ball.owner===players[controlledIndex]){
    if(!charging){charging=true;chargeStart=now();}
    chargePow=clamp((now()-chargeStart)/650,0,1);
  }
  // the referee jogs off the pitch after blowing kickoff
  if(ref.active){
    ref.t++;
    if(ref.t>20){ ref.armUp=false;
      ref.x=lerp(ref.x, PITCH.cx-56, 0.03); ref.y=lerp(ref.y, PITCH.bottom-6, 0.03); }
    if(ref.t>160) ref.active=false;
  }
  for(const p of players) updatePlayer(p);
  contactSnatch();
  updateBall();
  ballWatchdog();
  updateEffects();
}
// SAFETY NET: no game should ever soft-lock on a dead ball. If the ball sits
// free, still and untouched for too long (a deadlock in a corner or a scrum),
// hand it to the nearest outfielder so play always flows.
function ballWatchdog(){
  if(!ball.owner && ball.h<2 && Math.hypot(ball.vx,ball.vy)<0.3){
    ballIdle++;
    if(ballIdle>150){                 // ~2.5s of a genuinely dead ball
      let best=null,bd=1e9;
      for(const p of players){ if(p.role==='gk') continue;
        const d=dist(p.x,p.y,ball.x,ball.y); if(d<bd){bd=d;best=p;} }
      const tx=best?best.x:PITCH.cx, ty=best?best.y:PITCH.cy;   // centre fallback
      const a=Math.atan2(ty-ball.y, tx-ball.x);
      ball.vx=Math.cos(a)*2.4; ball.vy=Math.sin(a)*2.4; ball.ownerCd=0;
      spawnFloater(ball.x, ball.y-14, 'LOOSE BALL!', '#9fe8c0');
      ballIdle=0;
    }
  } else ballIdle=0;
}

// auto tackle / intercept: when opposing players collide with the ball carrier,
// the ball can be snatched on contact (no button needed). Strongly favours YOU
// on easy; the CPU rarely snatches back.
let snatchCd=0, ballIdle=0;
function contactSnatch(){
  if(snatchCd>0){ snatchCd--; return; }
  const o=ball.owner;
  if(!o || o.role==='gk') return;
  for(const q of players){
    if(q.team===o.team || q.role==='gk' || q.stun>0) continue;
    const wall = SHAOLIN() && q.power==='wall';
    if(dist(q.x,q.y,o.x,o.y) < q.r+o.r+(wall?4:1.5)){
      let chance = q.team==='L'? TUNE().snatchYou : TUNE().snatchCpu;

        if(wall){ const a=Math.atan2(o.y-q.y,o.x-q.x); o.vx+=Math.cos(a)*3.6; o.vy+=Math.sin(a)*3.6; o.stun=20; spawnShockwave(q.x,q.y,POWERS.wall.col,26); }
        spawnKickDust(q.x,q.y); SFX.tackle();

}
function updateEffects(){

}
function updateControlled(){
  let target=null;
  if(ball.owner && ball.owner.team==='L') target=ball.owner;
  else{ let best=1e9;
    for(const p of players){ if(p.team!=='L'||p.role==='gk')continue;
      const d=dist(p.x,p.y,ball.x,ball.y); if(d<best){best=d;target=p;} } }

}
function updatePlayer(p){
  p.anim+=Math.hypot(p.vx,p.vy)*0.5;
  if(p.kickCd>0)p.kickCd--; if(p.tackleCd>0)p.tackleCd--; if(p.stun>0)p.stun--; if(p.fumbleT>0)p.fumbleT--; if(p.specialCd>0)p.specialCd--;
  const sprint=(p.controlled&&keys.sprint)? ((SHAOLIN()&&p.power==='flash')?2.0:1.32) : 1.0;
  const spd=p.baseSpeed*TUNE().plSpeed*sprint*(p===ball.owner?0.93:1.0);
  if(p.controlled && p.stun<=0){
    let ix=(keys.right?1:0)-(keys.left?1:0), iy=(keys.down?1:0)-(keys.up?1:0);
    if(ix||iy){ const m=Math.hypot(ix,iy);
      p.vx=lerp(p.vx,(ix/m)*spd*1.75,0.46); p.vy=lerp(p.vy,(iy/m)*spd*1.75,0.46); p.fx=ix/m;p.fy=iy/m; }
    else { p.vx*=0.68; p.vy*=0.68; }
  } else if(p.role==='gk'){ goalieAI(p); }
  else if(p.stun<=0){ fieldAI(p); }
  else { p.vx*=0.8;p.vy*=0.8; }
  p.x+=p.vx; p.y+=p.vy;
  // SOLID GOAL FRAME: outfielders can't cross the goal line into the net;
  // keepers hold their line but never sink into the net.
  if(p.role==='gk'){
    if(p.team==='L') p.x=clamp(p.x, PITCH.left+3, PITCH.left+34);
    else             p.x=clamp(p.x, PITCH.right-34, PITCH.right-3);
  } else {
    p.x=clamp(p.x, PITCH.left+p.r, PITCH.right-p.r);
  }
  p.y=clamp(p.y, PITCH.top+2, PITCH.bottom-2);
  if(SHAOLIN() && p.power==='flash' && p.controlled && keys.sprint && Math.hypot(p.vx,p.vy)>1.6 && frames%2===0)
    particles.push({x:p.x,y:p.y,vx:0,vy:0,g:0,life:8,c:'rgba(255,232,77,0.45)',s:3});
  // pickup applies to FREE balls only — owned balls change hands exclusively via

  // outfielders can't trap a rocketing drive (keepers deal with those instead)
  if(ball.owner===null && ball.ownerCd<=0 && p.kickCd<=0 && p.stun<=0 && p.fumbleT<=0){
    const d=dist(p.x,p.y,ball.x,ball.y);
    const bsp=Math.hypot(ball.vx,ball.vy);
    // nobody hand-traps a rocket: keepers scoop only settled balls (fast shots
    // resolve through keeperSave's catch/parry/fumble), outfielders trap < 4.6
    if(d<p.r+ball.r+2 && ball.h<3 && bsp < (p.role==='gk'? 3.2 : 4.6)){
      if(p.role==='gk'){ ball.owner=p; ball.vx=ball.vy=0; ball.vh=0; p.holdT=0; SFX.save(); } else ball.owner=p;

}
function setToucher(p){ if(p.team==='L')_lastTouchL=p; else _lastTouchR=p; }
function updateBall(){
  if(ball.ownerCd>0)ball.ownerCd--;

    // magnetism, not glue: the ball is nudged ahead in the run and lags a touch,
    // pushed further when sprinting — leaving it open to a tackle.
    const sp=Math.hypot(o.vx,o.vy);
    const lead=o.r+ball.r+1.5 + sp*1.4;
    const tx=o.x+o.fx*lead, ty=o.y+o.fy*lead;
    ball.x=lerp(ball.x,tx,0.34); ball.y=lerp(ball.y,ty,0.34);
    ball.vx=o.vx; ball.vy=o.vy; ball.h=0; ball.vh=0; ball.spin+=Math.hypot(o.vx,o.vy)*0.3; return; }
  ball.x+=ball.vx; ball.y+=ball.vy; ball.spin+=Math.hypot(ball.vx,ball.vy)*0.4;
  ball.h+=ball.vh; ball.vh-=0.12; if(ball.h<0){ ball.h=0; if(ball.vh<-0.5)ball.vh*=-0.45; else ball.vh=0; }
  // driven balls keep their pace (shots stay shots); slow balls settle quickly
  const spd2=Math.hypot(ball.vx,ball.vy);
  const f=ball.h>1?0.995:(spd2>3?0.986:0.962); ball.vx*=f; ball.vy*=f;
  if(Math.abs(ball.vx)<0.02)ball.vx=0; if(Math.abs(ball.vy)<0.02)ball.vy=0;
  if(ball.y<PITCH.top+ball.r){ ball.y=PITCH.top+ball.r; ball.vy*=-0.7; SFX.kick(); }
  if(ball.y>PITCH.bottom-ball.r){ ball.y=PITCH.bottom-ball.r; ball.vy*=-0.7; SFX.kick(); }
  if(ball.x < PITCH.left+BOX_W && keeperSave('L')) return;
  if(ball.x > PITCH.right-BOX_W && keeperSave('R')) return;
  const gt=goalTop(), gb=goalBot();
  // RIGHT goal
  if(ball.x>PITCH.right-ball.r-2){
    if(postHit(PITCH.right)){}                                   // clangs off the bar, back into play
    else if(ball.y>gt && ball.y<gb && ball.h<9){ scoreGoal('L'); return; }
    else if(ball.x>PITCH.right-ball.r){ ball.x=PITCH.right-ball.r; ball.vx*=-0.62; ball.vy*=0.9; SFX.kick(); }
  }
  // LEFT goal
  if(ball.x<PITCH.left+ball.r+2){
    if(postHit(PITCH.left)){}
    else if(ball.y>gt && ball.y<gb && ball.h<9){ scoreGoal('R'); return; }
    else if(ball.x<PITCH.left+ball.r){ ball.x=PITCH.left+ball.r; ball.vx*=-0.62; ball.vy*=0.9; SFX.kick(); }
  }
}
// circular post collider — the ball reflects off the bar realistically and returns to play
function postHit(goalX){
  if(ball.h>=9) return false;
  for(const py of [goalTop(), goalBot()]){
    const dx=ball.x-goalX, dy=ball.y-py, d=Math.hypot(dx,dy), rr=ball.r+1.9;
    if(d<rr && d>0.001){
      const nx=dx/d, ny=dy/d, dot=ball.vx*nx+ball.vy*ny;
      if(dot<0){                                                  // heading into the post
        ball.vx=(ball.vx-2*dot*nx)*0.76; ball.vy=(ball.vy-2*dot*ny)*0.76;
        ball.vh=Math.max(ball.vh,1.3);                        // clang & pop up (gravity feel)
        ball.x=goalX+nx*rr; ball.y=py+ny*rr;
        SFX.post(); SFX.ooh(); shake=Math.max(shake,5); hitstop=Math.max(hitstop,2);
        spawnFloater(ball.x, ball.y-12, 'OFF THE BAR!', '#ffd83d');
        for(let i=0;i<7;i++) particles.push({x:goalX,y:py,vx:rnd(-1.8,1.8),vy:rnd(-1.8,1.8),g:0,life:rnd(8,16),c:'#ffffff',s:1});
        return true;
      }
    }
  }
  return false;
}

// ---------------------------------------------------------------- Keeper save (match)
function keeperSave(side){
  const gk=players.find(p=>p.role==='gk'&&p.team===side);
  if(!gk||ball.owner===gk||gk.kickCd>0) return false;   // never re-catch a ball you just cleared
  const d=dist(gk.x,gk.y,ball.x,ball.y);
  const base=gk.r+ball.r;
  const gloves = SHAOLIN() && gk.power==='gloves';
  let reach = side==='L' ? base+TUNE().plKeeperReach
                         : base*(difficulty===0?0.85:1)+TUNE().cpuKeeperReach;
  if(gloves) reach += 6;                          // GOLDEN GLOVES: superhuman reach
  if(d<reach && ball.h<8){
    // a fumbled shot stays fumbled — the keeper can't recover mid-flight
    if(gk.fumbleT>0) return false;
    // GOLDEN GLOVES super: a fully-charged keeper throws up a FORCE FIELD
    if(gloves && gk.charge>=1){
      gk.charge=0; gk.superFx=18; const outx=side==='L'?1:-1;
      ball.vx=outx*7.5+rnd(-1,1); ball.vy=rnd(-3,3); ball.vh=1.4; ball.ownerCd=16; gk.kickCd=10;
      spawnShockwave(gk.x,gk.y,POWERS.gloves.col,40); spawnFloater(gk.x,gk.y-16,'FORCE FIELD!',POWERS.gloves.col);
      flash=Math.max(flash,0.5); shake=Math.max(shake,6); hitstop=Math.max(hitstop,3); SFX.save(); crowdSwell(0.5,1.2);
      return true;
    }
    // METEOR SHOT blasts through any keeper but the golden gloves
    if(ball.meteor>14 && !gloves && rnd()<0.6){ ball.meteor=6; spawnFloater(gk.x,gk.y-16,'UNSTOPPABLE!',POWERS.meteor.col); return false; }
    // EASY: the CPU keeper fumbles nearly half his saves — the ball slips through
    if(side==='R' && TUNE().cpuKeeperFumble && !gloves && rnd()<TUNE().cpuKeeperFumble){
      gk.fumbleT=30;
      spawnFloater(gk.x, gk.y-16, 'FUMBLED!', '#ff9a7a');
      return false;
    }
    const sp=Math.hypot(ball.vx,ball.vy);
    // catching: YOUR keeper secures slow balls; the CPU keeper on EASY never
    // smothers your shots — a strike is either a GOAL or a proper punched SAVE
    const catchLimit = gloves ? 2.5 : (side==='L' ? 3.2 : (difficulty===0 ? 1.2 : 2.0));
    if(sp<catchLimit){
      ball.owner=gk; ball.vx=ball.vy=0; ball.vh=0; ball.h=0; gkCatchImpact(gk, side, sp);
    } else {
      // firm parry: PUNCH the ball up and out toward a wing — live rebound!
      const outx=side==='L'?1:-1;
      const wing=ball.y<PITCH.cy? -1 : 1;
      ball.vx=outx*(2.0+sp*0.35);
      ball.vy=wing*rnd(1.2,2.6);
      ball.vh=1.3; ball.ownerCd=14;
      spawnFloater(gk.x, gk.y-16, pick(['WHAT A SAVE!','PUNCHED CLEAR!','DENIED!']), '#9fe8c0'); SFX.ooh();
      for(let i=0;i<6;i++) particles.push({x:ball.x,y:ball.y,vx:outx*rnd(0.5,2.2),vy:rnd(-1.8,1.8),g:0,life:rnd(10,18),c:'rgba(255,255,255,0.6)',s:1});
    }
    SFX.save(); shake=Math.max(shake,2); return true;
  }
  return false;
}

// ---------------------------------------------------------------- AI (match)
function nearestOpp(p){ let best=null,bd=1e9;
  for(const q of players){ if(q.team===p.team)continue; const d=dist(p.x,p.y,q.x,q.y); if(d<bd){bd=d;best=q;} }
  return {opp:best,d:bd}; }
function teamHasBall(team){ return ball.owner && ball.owner.team===team; }
function fieldAI(p){
  const goalX=p.team==='L'?PITCH.right:PITCH.left;
  const ownGoalX=p.team==='L'?PITCH.left:PITCH.right;
  // SHAOLIN AI: unleash a charged super in the right moment
  if(SHAOLIN() && p.charge>=1 && p.stun<=0){
    const nearBall=dist(p.x,p.y,ball.x,ball.y)<50;
    const owningIt = ball.owner===p;
    const inRange = dist(p.x,p.y,goalX,PITCH.cy)<(BOX_W+30) && Math.abs(p.y-PITCH.cy)<GOAL_H;
    if(p.power==='meteor' && owningIt && inRange && rnd()<0.08){ superMove(p); return; }
    if((p.power==='tornado'||p.power==='quake'||p.power==='wall') && nearBall && ball.owner && ball.owner.team!==p.team && rnd()<0.05){ superMove(p); return; }
    if(p.power==='flash' && nearBall && rnd()<0.04){ superMove(p); return; }
  }
  const spd=p.baseSpeed*(p.team==='R'? TUNE().aiSpeed : 1.02);
  const iAmClosest=(()=>{ let best=1e9,who=null;
    for(const q of players){ if(q.team!==p.team||q.role==='gk')continue;
      const d=dist(q.x,q.y,ball.x,ball.y); if(d<best){best=d;who=q;} } return who===p; })();
  let tx=p.homeX, ty=p.homeY;
  if(ball.owner===p){
    const dg=dist(p.x,p.y,goalX,PITCH.cy); const {opp,d}=nearestOpp(p);
    // shoot when in range
    if(dg<(BOX_W+18) && Math.abs(p.y-PITCH.cy)<GOAL_H*0.75){
      if(rnd()<TUNE().aiShootP){ aiShoot(p,goalX); return; } }
    // TEAM PLAY: look to pass — proactively to a better-placed team-mate, or under pressure
    const pressured = opp && d<26;
    if((pressured && rnd()<0.22) || rnd()<(TUNE().aiPassP*1.6+0.02)){
      if(aiPass(p, pressured)) return;
    }
    // otherwise carry it forward, dodging the nearest presser
    tx=goalX; ty=lerp(p.y,PITCH.cy,0.02)+(p.y<PITCH.cy?18:-18);
    if(opp&&d<30){ ty+=(p.y<opp.y?-14:14); }
  } else if(teamHasBall(p.team)){
    // SUPPORT RUN: offer a passing lane — advance & spread to open space (triangles)
    const o=ball.owner; const side=p.homeY<PITCH.cy?-1:1;
    tx=lerp(o.x,goalX,0.55)+(p.role==='fw'?26:-6);
    ty=PITCH.cy + side*(GOAL_H*0.62) + Math.sin(now()*0.001+p.homeY)*8;
    const {opp,d}=nearestOpp(p);
    if(opp && d<28){ ty += (p.y<opp.y?-16:16); tx += (p.x<opp.x?-10:10); }   // peel into space
  } else if(ball.owner && ball.owner.team!==p.team){
    if(iAmClosest){
      if(TUNE().standoff && p.team==='R'){
        // EASY: soft press — the defender holds off a step instead of swarming you
        tx=lerp(ball.x, ownGoalX, 0.3); ty=lerp(ball.y, PITCH.cy, 0.2);
      } else { tx=ball.x; ty=ball.y; }
      const d=dist(p.x,p.y,ball.owner.x,ball.owner.y);
      if(d<15 && p.tackleCd<=0 && rnd()<TUNE().aiTackleP){
        ball.owner.stun=14; const th=ball.owner; ball.owner=null; ball.ownerCd=8;
        ball.vx=(p.x<th.x?-1:1)*1.4+rnd(-.5,.5); ball.vy=rnd(-.8,.8); p.tackleCd=24; }
    } else { tx=lerp(ball.x,ownGoalX,0.35); ty=lerp(ball.y,PITCH.cy,0.3)+(p.homeY<PITCH.cy?-30:30); }
  } else { if(iAmClosest){ tx=ball.x+ball.vx*6; ty=ball.y+ball.vy*6; }
    else { tx=lerp(p.homeX,ball.x,0.15); ty=lerp(p.homeY,ball.y,0.15); } }
  steer(p,tx,ty,spd);
}
function steer(p,tx,ty,spd){ let dx=tx-p.x,dy=ty-p.y; const m=Math.hypot(dx,dy);
  if(m>1){ dx/=m;dy/=m; p.vx=lerp(p.vx,dx*spd*1.55,0.12); p.vy=lerp(p.vy,dy*spd*1.55,0.12); p.fx=dx;p.fy=dy; }
  else { p.vx*=0.8;p.vy*=0.8; } }
function aiShoot(p,goalX){ const spread=TUNE().aiSpread;
  let ax=goalX-p.x, ay=(PITCH.cy+rnd(-GOAL_H*0.38,GOAL_H*0.38))-p.y; const m=Math.hypot(ax,ay)||1; ax/=m;ay/=m;
  ay+=rnd(-spread,spread);
  const speed = difficulty===0? 3.4+rnd(0,0.8) : 4.2+rnd(0,1.1);  // easy: slower, saveable shots
  setToucher(p);
  ball.vx=ax*speed; ball.vy=ay*speed; ball.vh=1.3; ball.owner=null; ball.ownerCd=14; p.kickCd=14;
  if(SHAOLIN()){ ball.meteor=(p.power==='meteor')?30:20; }   // AI Shaolin shots blaze too
  SFX.shoot(0.8); }
function segDist(px,py,ax,ay,bx,by){ const dx=bx-ax,dy=by-ay,L2=dx*dx+dy*dy||1;
  let t=((px-ax)*dx+(py-ay)*dy)/L2; t=clamp(t,0,1); return Math.hypot(px-(ax+dx*t),py-(ay+dy*t)); }
function aiPass(p, forced){
  let best=null,bs=-1e9;
  for(const q of players){ if(q.team!==p.team||q===p||q.role==='gk') continue;
    const d=dist(p.x,p.y,q.x,q.y); if(d<22||d>230) continue;
    const forward=(p.team==='L'? q.x-p.x : p.x-q.x);          // advances the ball
    let openMin=1e9; for(const o of players){ if(o.team===p.team) continue; openMin=Math.min(openMin,dist(q.x,q.y,o.x,o.y)); }
    let blocked=0; for(const o of players){ if(o.team===p.team) continue; if(segDist(o.x,o.y,p.x,p.y,q.x,q.y)<12) blocked++; }
    const s = forward*1.0 + openMin*0.6 - blocked*45 - d*0.08;
    if(s>bs){ bs=s; best=q; }
  }
  if(!best) return false;
  if(!forced && bs<24) return false;                          // only pass if genuinely a good option
  let tx=best.x+best.vx*12, ty=best.y+best.vy*12;             // lead the runner
  let ax=tx-p.x, ay=ty-p.y; const m=Math.hypot(ax,ay)||1; ax/=m;ay/=m;
  const speed=clamp(2.6+dist(p.x,p.y,best.x,best.y)*0.04, 3.0, 5.8); setToucher(p);
  ball.vx=ax*speed; ball.vy=ay*speed; ball.vh=0.5; ball.owner=null; ball.ownerCd=12; p.kickCd=10; SFX.pass();
  return true;
}
function goalieAI(p){
  const myGoalX=p.team==='L'?PITCH.left:PITCH.right;
  const spd=p.baseSpeed*1.2;
  const lineX=myGoalX+(p.team==='L'?10:-10);
  // holding the ball? step forward briefly, then CLEAR it upfield (fixes hold-forever glitch)
  if(ball.owner===p){
    p.holdT++;
    const fwd = p.team==='L'? 1 : -1;
    steer(p, myGoalX+fwd*18, PITCH.cy+rnd(-2,2), spd*0.55);
    p.fx=fwd; p.fy=0;
    if(p.holdT>45){ gkClear(p); }
    return;
  }
  p.holdT=0;
  const skill=p.team==='L'?0.9:TUNE().cpuKeeperSkill;
  let predY=ball.y;
  if((p.team==='L'?ball.vx<0:ball.vx>0)&&Math.abs(ball.vx)>0.3){
    const dx=Math.abs(ball.x-lineX);
    const full=ball.y+ball.vy*(dx/Math.max(0.5,Math.abs(ball.vx)));
    predY=lerp(ball.y,full,skill); }
  let tx=lineX, ty=clamp(predY,goalTop()+4,goalBot()-4);
  const dgx=Math.abs(ball.x-myGoalX);
  if(dgx<34 && !ball.owner && Math.hypot(ball.vx,ball.vy)<3){ tx=lerp(lineX,ball.x,0.6); ty=ball.y; }
  steer(p,tx,ty,spd*1.15);
  if(p.team==='L') p.x=clamp(p.x,PITCH.left-2,PITCH.left+30); else p.x=clamp(p.x,PITCH.right-30,PITCH.right+2);
  p.y=clamp(p.y,goalTop()-10,goalBot()+10);
}

// catch impact: the keeper recoils backward with the ball, sparks fly (feels physical)
function gkCatchImpact(gk, side, sp){
  const push=(side==='L'?-1:1)*clamp(0.8+sp*0.4, 0.8, 2.2);
  gk.x += push*2.5; gk.vx += push;            // knocked back toward his goal
  shake=Math.max(shake,2.5);
  for(let i=0;i<9;i++) particles.push({x:ball.x,y:ball.y,
    vx:rnd(-1.6,1.6), vy:rnd(-1.6,1.6), g:0, life:rnd(8,18), c:'rgba(255,255,255,0.75)', s:1});
  noise(0.08,0.28,180);                        // low thud
}

// keeper clearance: big lofted kick toward a teammate upfield
function gkClear(p){
  p.holdT=0;
  const mates=players.filter(q=>q.team===p.team && q.role!=='gk');
  // prefer the most advanced teammate (toward the opponent goal)
  mates.sort((a,b)=> p.team==='L'? b.x-a.x : a.x-b.x);
  const target = rnd()<0.7? mates[0] : pick(mates);
  let ax=target.x-p.x, ay=(target.y+rnd(-14,14))-p.y;
  const m=Math.hypot(ax,ay)||1; ax/=m; ay/=m;
  // clear decisively so it always leaves the box (weaker on EASY so you can press)
  const speed = (p.team==='R' && difficulty===0)? 4.2 : 5.4;
  setToucher(p);
  ball.vx=ax*speed; ball.vy=ay*speed; ball.vh=2.2;   // high loft, sails over heads
  ball.owner=null; ball.ownerCd=20; p.kickCd=22;
  SFX.kick(); spawnKickDust(p.x,p.y);
}

// ---------------------------------------------------------------- Goals & flow (match)
let _lastTouchL=null,_lastTouchR=null;
function lastToucher(team){ return team==='L'?_lastTouchL:_lastTouchR; }
function scoreGoal(team){
  const scorer = ball.owner && ball.owner.team===team ? ball.owner : lastToucher(team);
  const wasBehind = team==='L' ? scoreL<scoreR : scoreR<scoreL;
  if(team==='L') scoreL++; else scoreR++;
  celebrate=110; celebrateTeam=team;
  celebrateText = team==='L'? (SHAOLIN()?'SHAOLIN GOAL!':'G O A L !') : 'CONCEDED';
  if(team==='L' && wasBehind && scoreL===scoreR) setTimeout(()=>{ floaterCd=0; spawnFloater(W/2,H/2+40,'ALL SQUARE!','#7fb0ff'); },900);
  const mm=Math.floor(matchTime/60), ss=matchTime%60;
  celebrateName = scorer? (scorer.name+' '+(team==='L'?homeC.code:awayC.code)+' · '+mm+':'+(ss<10?'0':'')+ss) : '';
  goalBulge={ side: team==='L'?'R':'L', t:24, y: ball.y };  hitstop=Math.max(hitstop,3);
  if(scorer){ scorer.goals=(scorer.goals||0)+1;    // MVP tracking
    if(scorer.goals===3) celebrateText='HAT-TRICK!'; // pure football magic
    // point the scorer back toward the pitch for his knee-slide
    scorer.fx = team==='L'? -1 : 1; scorer.fy = rnd(-0.4,0.4);
    const m=Math.hypot(scorer.fx,scorer.fy)||1; scorer.fx/=m; scorer.fy/=m;
  }
  _celebScorer=scorer;
  flash=1; shake=10; crowdHype=120; hypeTeam=team; SFX.goal(); SFX.whistle(false);
  const gx=team==='L'?PITCH.right:PITCH.left;
  const cols = team==='L' ? [homeC.kit.shirt,'#ffffff',homeC.kit.short,'#ffd83d'] : [awayC.kit.shirt,'#ffffff','#ff5a3d'];
  for(let i=0;i<64;i++) particles.push({x:gx,y:PITCH.cy+rnd(-GOAL_H/2,GOAL_H/2),
    vx:(team==='L'?-1:1)*rnd(0.5,4), vy:rnd(-3,3), g:0.06, life:rnd(40,84), c:cols[i%cols.length], s:rnd(1,3)});
  pendingOver = (scoreL>=goalTarget() || scoreR>=goalTarget());
  resetTimer = pendingOver? 130 : 95;
  _celebSlideUntil = resetTimer-42;                 // knee-slide for the first ~0.7s
  ball.owner=null; ball.vx=ball.vy=0;
}
// post-goal scene: scorer knee-slides, teammates mob him, losers slump
function celebTick(){
  const sc=_celebScorer;
  for(const p of players){
    p.anim+=0.35;
    if(p.team===celebrateTeam){
      if(sc && p===sc && resetTimer>_celebSlideUntil){
        // knee slide across the turf, grass spraying
        p.x+=p.fx*1.5; p.y+=p.fy*1.5;
        p.x=clamp(p.x,PITCH.left+10,PITCH.right-10); p.y=clamp(p.y,PITCH.top+10,PITCH.bottom-8);
        if(frames%2===0) particles.push({x:p.x-p.fx*4,y:p.y+4,vx:-p.fx*rnd(0.2,0.9),vy:rnd(-0.4,0.4),
          g:0, life:rnd(8,16), c: frames%4? 'rgba(255,255,255,0.5)':'#2f8f3f', s:1});
      } else if(sc && p!==sc){
        // teammates sprint over to mob the scorer
        const d=dist(p.x,p.y,sc.x,sc.y);
        if(d>16){ steer(p,sc.x+rnd(-6,6),sc.y+rnd(-6,6),1.25); p.x+=p.vx; p.y+=p.vy; }
        else { p.vx*=0.6; p.vy*=0.6; }
      }
    } else { p.vx*=0.85; p.vy*=0.85; }   // the other team stands gutted
  }
}
function spawnKickDust(x,y){ for(let i=0;i<6;i++) particles.push({x,y,vx:rnd(-1,1),vy:rnd(-1,1),g:0,life:rnd(10,20),c:'rgba(255,255,255,0.5)',s:1}); }
function endMatch(){
  celebrate=0; particles=[]; floaters=[]; fade=1; titleT=0;
  if(gameMode==='cup'){
    if(scoreL>scoreR){
      cup.results[cup.stage]=[scoreL,scoreR];
      cup.stage++; refreshCupTune();
      if(cup.stage>2){ winStreak++; state='champion'; crowdHype=200; crowdSwell(0.7,2.5); SFX.goal(); return; }
      state='cup'; SFX.whistle(true); crowdSwell(0.5,1.5); return;
    }
    winStreak=0; state='over'; SFX.whistle(true); return;
  }
  state='over'; SFX.whistle(true);
  if(scoreL>scoreR){ winStreak++; crowdSwell(0.6,2); } else winStreak=0;
}

/* =========================================================================
   PENALTY SHOOTOUT MODE — best of 5, then sudden death.
   You shoot: SPACE locks the sweeping aim, SPACE again locks the power.
   You save: press ↑ or ↓ (or nothing = stay centre) while the CPU runs up.
   ========================================================================= */
let pk=null;
let pkShooter=null, pkKeeper=null;
const PK_SPOT_X = ()=>PITCH.right-46;
function resetPk(){
  pk={ phase:'intro', t:0, round:1, youArr:[], cpuArr:[], sudden:false,
    aimY:PITCH.cy, aimDir:1, lockedY:null, power:0, powDir:1, lockedPow:null,
    flyT:0, flyFrom:{x:0,y:0}, flyTo:{x:0,y:0}, flyFrames:24, loft:6, missHigh:false,
    outcome:'', diveChoice:0, cpuTargetY:PITCH.cy, keeperFromY:PITCH.cy, keeperToY:PITCH.cy,
    telegraphZone:0, banner:'', bannerCol:'#fff', turn:'you', done:false, youWin:false,
    freeze:0, roundFlash:0, decider:false, slowmo:false };
  pkShooter = mkPlayer('L','fw', PK_SPOT_X()-16, PITCH.cy);
  pkShooter.name = players.find(p=>p.team==='L'&&p.role==='fw').name;
  pkShooter.skin = pick(SKINS); pkShooter.hair = pick(HAIRS);
  pkKeeper = mkPlayer('R','gk', PITCH.right-8, PITCH.cy);
  ball.x=PK_SPOT_X(); ball.y=PITCH.cy; ball.h=0; ball.vh=0; ball.vx=ball.vy=0; ball.owner=null;
  particles=[]; ballTrail=[]; floaters=[];
}
function pkScore(arr){ return arr.filter(Boolean).length; }
function pkDecided(){
  const N=5, a=pk.youArr.length, b=pk.cpuArr.length;
  const sy=pkScore(pk.youArr), sc=pkScore(pk.cpuArr);
  if(!pk.sudden){
    if(sy > sc + (N-b)) return 'you';
    if(sc > sy + (N-a)) return 'cpu';
    if(a>=N && b>=N){ if(sy===sc){ pk.sudden=true; return null; } return sy>sc?'you':'cpu'; }
    return null;
  }
  if(a===b && a>0){ if(sy!==sc) return sy>sc?'you':'cpu'; }
  return null;
}
// would this kick end the shootout (either by scoring or by missing)?
function pkKickDecides(turn){
  const test=(scored)=>{
    const you=pk.youArr.slice(), cpu=pk.cpuArr.slice();
    (turn==='you'?you:cpu).push(scored);
    const N=5, sy=you.filter(Boolean).length, sc=cpu.filter(Boolean).length, a=you.length, b=cpu.length;
    if(!pk.sudden){
      if(sy>sc+(N-b) || sc>sy+(N-a)) return true;
      if(a>=N && b>=N && sy!==sc) return true;
      return false;
    }
    return a===b && sy!==sc;
  };
  return test(true)||test(false);
}
function pkStartYou(){
  pk.turn='you'; pk.phase='place'; pk.t=0; pk.roundFlash=55;
  pk.decider=pkKickDecides('you'); pk.slowmo=pk.decider;
  pk.aimY=PITCH.cy; pk.aimDir=1; pk.lockedY=null; pk.power=0; pk.powDir=1; pk.lockedPow=null; pk.missHigh=false;
  pkShooter.team='L'; pkShooter.role='fw';
  pkShooter.x=PK_SPOT_X()-34; pkShooter.y=PITCH.cy; pkShooter.fx=1; pkShooter.fy=0; pkShooter.anim=0;
  pkKeeper.team='R'; pkKeeper.role='gk';
  pkKeeper.x=PITCH.right-8; pkKeeper.y=PITCH.cy; pk.keeperFromY=PITCH.cy; pk.keeperToY=PITCH.cy;
  ball.x=PK_SPOT_X(); ball.y=PITCH.cy; ball.h=0; ball.vx=ball.vy=0;
}
function pkStartCpu(){
  pk.turn='cpu'; pk.phase='cwind'; pk.t=0; pk.diveChoice=0; pk.missHigh=false;
  pk.decider=pkKickDecides('cpu'); pk.slowmo=pk.decider;
  pkShooter.team='R'; pkShooter.role='fw';
  pkShooter.x=PK_SPOT_X()-16; pkShooter.y=PITCH.cy; pkShooter.fx=1; pkShooter.fy=0; pkShooter.anim=0;
  pkKeeper.team='L'; pkKeeper.role='gk';
  pkKeeper.x=PITCH.right-8; pkKeeper.y=PITCH.cy; pk.keeperFromY=PITCH.cy; pk.keeperToY=PITCH.cy;
  ball.x=PK_SPOT_X(); ball.y=PITCH.cy; ball.h=0; ball.vx=ball.vy=0;
  const zones=[-1,0,1];
  const zone = difficulty===0 ? pick([-1,0,0,1]) : pick(zones);
  pk.telegraphZone=zone;
  pk.cpuTargetY = PITCH.cy + zone*23 + rnd(-4,4);
}
function pkKey(k){
  if(!pk) return;
  if(pk.phase==='intro' && (k==='start'||k==='shoot')){ pkStartYou(); SFX.select(); return; }
  if(pk.phase==='place' && (k==='shoot'||k==='start')){ pkShooter.x=PK_SPOT_X()-16; pk.phase='aim'; pk.t=0; return; }
  if(pk.phase==='aim' && (k==='shoot'||k==='start')){ pk.lockedY=pk.aimY; pk.phase='power'; pk.t=0; SFX.select(); return; }
  if(pk.phase==='power' && (k==='shoot'||k==='start')){ pk.lockedPow=pk.power; pk.phase='run'; pk.t=0; SFX.kick(); return; }
  if(pk.phase==='cwind'){
    if(k==='up'){ pk.diveChoice=-1; SFX.move(); }
    if(k==='down'){ pk.diveChoice=1; SFX.move(); }
  }
}
function pkResolveYouShot(){
  const T=TUNE();
  const pow=pk.lockedPow, ty=pk.lockedY;
  if(pow>0.93 && rnd()<0.55){
    pk.outcome='miss'; pk.missHigh=true;
    pk.keeperToY=PITCH.cy + rnd(-10,10);
    return;
  }
  const travel = 19 - pow*7;
  const guess = rnd()<T.pkGuess;
  let keeperFinal;
  if(guess){ keeperFinal = PITCH.cy + clamp(ty-PITCH.cy, -travel, travel); }
  else { const sgn = (ty>=PITCH.cy?1:-1); keeperFinal = PITCH.cy - sgn*rnd(8,18); }
  pk.keeperToY = keeperFinal;
  const d=Math.abs(keeperFinal-ty);
  const reach=6.5+(1-pow)*4.5;
  pk.outcome = d<reach ? 'save' : 'goal';
  // living dangerously: rocket shots at the very corner can clatter the post
  if(pk.outcome==='goal' && Math.abs(ty-PITCH.cy)>GOAL_H*0.40 && pow>0.78 && rnd()<0.13) pk.outcome='post';
}
function pkResolveCpuShot(){
  const T=TUNE();
  if(rnd()<T.pkCpuMiss){ pk.outcome='miss'; pk.missHigh=true; pk.keeperToY=PITCH.cy+pk.diveChoice*20; return; }
  const keeperFinal = PITCH.cy + pk.diveChoice*20;
  pk.keeperToY=keeperFinal;
  const d=Math.abs(pk.cpuTargetY-keeperFinal);
  pk.outcome = (d<8 && rnd()<T.pkSaveP) ? 'save' : 'goal';
  if(pk.outcome==='goal' && rnd()<0.06) pk.outcome='post';
}
function pkLaunch(targetY, pow){
  pk.flyFrom={x:PK_SPOT_X(), y:PITCH.cy};
  let off = pk.missHigh ? (targetY>=PITCH.cy? 14 : -14) : 0;
  if(pk.outcome==='post') off = (targetY>=PITCH.cy? 5 : -5);   // clip the frame
  pk.flyTo={x:PITCH.right-2, y:targetY+off};
  pk.flyFrames = Math.round(26 - pow*10);
  pk.loft = pk.missHigh? 14 : 4+pow*3;
  pk.flyT=0; ball.stretch=6;
  pk.freeze=6;               // hitstop: tiny freeze on contact for punch
  shake=Math.max(shake,1.5);
  SFX.shoot(pow);
}
function pkRecord(){
  const scored = pk.outcome==='goal';
  if(pk.turn==='you') pk.youArr.push(scored); else pk.cpuArr.push(scored);
  if(scored){
    pk.banner = pk.turn==='you'? 'G O A L !' : 'CPU SCORES';
    pk.bannerCol = pk.turn==='you'? '#ffe84d' : '#ff8a7a';
    hypeTeam = pk.turn==='you'? 'L':'R';
    if(pk.turn==='you'){ flash=1; shake=6; crowdHype=90; SFX.goal();
      const cols=[homeC.kit.shirt,'#ffffff','#ffd83d'];
      for(let i=0;i<40;i++) particles.push({x:PITCH.right,y:PITCH.cy+rnd(-GOAL_H/2,GOAL_H/2),
        vx:-rnd(0.5,3.5), vy:rnd(-2.5,2.5), g:0.06, life:rnd(30,70), c:cols[i%cols.length], s:rnd(1,3)});
    } else { SFX.goal(); }
  } else if(pk.outcome==='save'){
    pk.banner = pk.turn==='you'? 'S A V E D !' : 'YOU SAVED IT!';
    pk.bannerCol = pk.turn==='you'? '#ff8a7a' : '#39d98a';
    SFX.save(); shake=4;
    if(pk.turn==='cpu'){ crowdSwell(0.4,1); }
  } else if(pk.outcome==='post'){
    pk.banner = pk.turn==='you'? 'OFF THE POST!' : 'CPU RATTLES THE POST!';
    pk.bannerCol = pk.turn==='you'? '#ffd83d' : '#39d98a';
    SFX.post(); SFX.ooh(); shake=5;
    for(let i=0;i<8;i++) particles.push({x:PITCH.right,y:ball.y,vx:-rnd(0.5,2.5),vy:rnd(-2,2),g:0,life:rnd(10,22),c:'#ffffff',s:1});
  } else {
    pk.banner = pk.turn==='you'? 'OVER THE BAR!' : 'CPU BLAZES WIDE!';
    pk.bannerCol = pk.turn==='you'? '#ff8a7a' : '#39d98a';
    SFX.miss();
  }
  if(pk.outcome==='goal'){  // net ripple + bulge
    goalBulge={ side:'R', t:24, y: clamp(ball.y, goalTop(), goalBot()) };
    for(let i=0;i<7;i++) particles.push({x:PITCH.right+GOAL_DEPTH-2,y:ball.y+rnd(-6,6),
      vx:rnd(0.2,0.9),vy:rnd(-0.6,0.6),g:0,life:rnd(8,16),c:'rgba(255,255,255,0.6)',s:1});
  }
}
function pkTick(){
  pk.t++;
  updateEffects();
  pkShooter.anim += Math.abs(pkShooter.vx)*0.6;
  // smooth keeper motion toward keeperToY during flight phases
  switch(pk.phase){
    case 'intro':
      if(pk.t>150) { pkStartYou(); }
      break;
    case 'place': {
      // the ritual: walk up, set the ball down with a little bounce, step back
      if(pk.t<24){ pkShooter.x=lerp(pkShooter.x, PK_SPOT_X()-7, 0.14); pkShooter.anim+=0.5; }
      else if(pk.t===24){ ball.h=0.1; ball.vh=0.9; SFX.kick(); }
      else if(pk.t>32){ pkShooter.x=lerp(pkShooter.x, PK_SPOT_X()-16, 0.16); pkShooter.anim+=0.3;
        if(pk.t>56){ pk.phase='aim'; pk.t=0; } }
      if(ball.h>0||ball.vh>0){ ball.h+=ball.vh; ball.vh-=0.12; if(ball.h<0){ball.h=0;ball.vh=0;} }
      break; }
    case 'aim': {
      if(pk.t%44===0||pk.t%44===9) SFX.heart();     // thump-thump
      // keeper sways on his line, trying to fill your vision
      pkKeeper.y = PITCH.cy + Math.sin(pk.t*0.13)*3; pkKeeper.anim+=0.15;
      const lo=goalTop()+5, hi=goalBot()-5;
      pk.aimY += pk.aimDir*1.15;
      if(pk.aimY>hi){pk.aimY=hi;pk.aimDir=-1;} if(pk.aimY<lo){pk.aimY=lo;pk.aimDir=1;}
      break; }
    case 'power': {
      if(pk.t%44===0||pk.t%44===9) SFX.heart();
      pk.power += pk.powDir*0.028;
      if(pk.power>1){pk.power=1;pk.powDir=-1;} if(pk.power<0){pk.power=0;pk.powDir=1;}
      break; }
    case 'run': {
      pkShooter.vx=1.9; pkShooter.x+=1.9;
      if(pkShooter.x>=PK_SPOT_X()-4){
        pkShooter.vx=0;
        pk.keeperFromY=pkKeeper.y;
        pkResolveYouShot();
        pkLaunch(pk.lockedY, pk.lockedPow);
        pk.phase='fly'; pk.t=0;
      }
      break; }
    case 'fly': {
      if(pk.freeze>0){ pk.freeze--; break; }   // hitstop
      if(pk.slowmo && frames%2===0) break;     // THE DECIDER plays out in slow motion
      pk.flyT++;
      const t=clamp(pk.flyT/pk.flyFrames,0,1);
      ball.x=lerp(pk.flyFrom.x,pk.flyTo.x,t);
      ball.y=lerp(pk.flyFrom.y,pk.flyTo.y,t);
      ball.h=Math.sin(Math.PI*t)*pk.loft + (pk.missHigh? t*10:0);
      ball.spin+=1.2;
      ballTrail.push({x:ball.x,y:ball.y-ball.h,life:10});
      pkKeeper.y=lerp(pk.keeperFromY,pk.keeperToY, Math.min(1,t*1.2));
      pkKeeper.anim+=0.8;
      if(t>=1){
        pkRecord(); pk.phase='result'; pk.t=0;
        if(pk.outcome==='save'){
          ball.x=pkKeeper.x-7; ball.y=pkKeeper.y; ball.h=0;
          pkKeeper.x+=6; pkKeeper.vx=(pkKeeper.vx||0)+2.5;   // feels the hit — driven back
          shake=Math.max(shake,5); hitstop=Math.max(hitstop,2);
          for(let i=0;i<12;i++) particles.push({x:ball.x,y:ball.y,
            vx:rnd(-2,2),vy:rnd(-2,2),g:0,life:rnd(8,20),c:'rgba(255,255,255,0.8)',s:1});
          noise(0.1,0.32,170);
        }
        if(pk.outcome==='goal'){ ball.x=PITCH.right+6; ball.h=1; }
      }
      break; }
    case 'result': {
      if(pk.t>85){
        const w=pkDecided();
        if(w){ pkFinish(w); }
        else if(pk.turn==='you'){ pkStartCpu(); }
        else { pk.round++; pkStartYou(); }
      }
      break; }
    case 'cwind': {
      if(pk.t%44===0||pk.t%44===9) SFX.heart();
      if(pk.t%14===3 && rnd()<0.5) beep(rnd(2100,2900),0.05,'triangle',0.045); // fans whistling the taker
      pkKeeper.y = PITCH.cy + Math.sin(pk.t*0.17)*2;    // your keeper bounces, ready
      // CPU runs up; you pick a dive
      if(pk.t>20) pkShooter.x=lerp(pkShooter.x, PK_SPOT_X()-4, 0.08);
      pkShooter.anim+=0.5;
      if(pk.t>=64){
        pk.keeperFromY=pkKeeper.y;
        pkResolveCpuShot();
        pkLaunch(pk.cpuTargetY, rnd(0.55,0.85));
        pk.phase='fly'; pk.t=0;
      }
      break; }
    case 'end': {
      if(pk.t>120){ state='over'; fade=1; titleT=0; }
      break; }
  }
}
function pkFinish(winner){
  pk.done=true; pk.youWin = winner==='you';
  pk.phase='end'; pk.t=0;
  scoreL=pkScore(pk.youArr); scoreR=pkScore(pk.cpuArr);
  hypeTeam = pk.youWin? 'L':'R';
  if(pk.youWin){ winStreak++; SFX.goal(); crowdSwell(0.65,2); flash=1; crowdHype=180;
    const cols=[homeC.kit.shirt,'#ffffff','#ffd83d','#39d98a'];
    for(let i=0;i<80;i++) particles.push({x:rnd(W*0.2,W*0.8), y:PITCH.top+rnd(0,40),
      vx:rnd(-1,1), vy:rnd(0.5,2.5), g:0.03, life:rnd(50,110), c:cols[i%cols.length], s:rnd(1,3)});
  }
  else { winStreak=0; SFX.whistle(true); }
}

// ================================================================ RENDER
function render(){
  ctx.save();
  if(fxShake && shake>0 && (state==='play'||state==='pk')) ctx.translate(rnd(-shake,shake),rnd(-shake,shake));
  drawPitch();

  if(state==='title'){ drawTitle(); ctx.restore(); drawFX(); return; }
  if(state==='howto'){ drawHowto(); ctx.restore(); drawFX(); return; }
  if(state==='credits'){ drawCredits(); ctx.restore(); drawFX(); return; }
  if(state==='settings'){ drawSettings(); ctx.restore(); drawFX(); return; }
  if(state==='mode'){ drawMode(); ctx.restore(); drawFX(); return; }
  if(state==='diff'){ drawDiff(); ctx.restore(); drawFX(); return; }
  if(state==='select'){ drawSelect(); ctx.restore(); drawFX(); return; }
  if(state==='cup'){ drawCupScreen(); ctx.restore(); drawFX(); return; }
  if(state==='champion'){ drawChampion(); ctx.restore(); drawFX(); return; }
  if(state==='lineup'){ drawLineup(); ctx.restore(); drawFX(); return; }

  if(state==='pk' || (state==='over'&&gameMode==='pk')){
    drawPkScene();
    ctx.restore();
    drawPkHUD();
    if(paused) drawPauseMenu();
    if(state==='over') drawOver();
    drawFX();
    return;
  }

  // match render
  for(const s of ballTrail){ ctx.globalAlpha=s.life/16; ctx.fillStyle='#fff'; ctx.fillRect(Math.round(s.x)-1,Math.round(s.y)-1,2,2); }
  ctx.globalAlpha=1;
  for(const p of players) drawShadow(p.x,p.y,p.r);
  drawBallShadow();
  drawRef();

// ---- pitch ----
let sponsorScroll=0;
function drawPitch(){
  ctx.fillStyle='#0c1a12'; ctx.fillRect(0,0,W,H);
  drawStand();
  const stripes=14, sw=(PITCH.right-PITCH.left)/stripes;
  for(let i=0;i<stripes;i++){ ctx.fillStyle=i%2?'#2f8f3f':'#37a047';
    ctx.fillRect(PITCH.left+i*sw,PITCH.top,Math.ceil(sw)+1,PITCH.bottom-PITCH.top); }
  ctx.globalAlpha=0.06; ctx.fillStyle='#000';
  for(let y=PITCH.top;y<PITCH.bottom;y+=6) ctx.fillRect(PITCH.left,y,PITCH.right-PITCH.left,1);
  ctx.globalAlpha=1;
  // cross-mow bands: soft checkerboard sheen over the stripes
  ctx.globalAlpha=0.05; ctx.fillStyle='#ffffff';
  for(let y=PITCH.top;y<PITCH.bottom;y+=24) ctx.fillRect(PITCH.left,y,PITCH.right-PITCH.left,12);
  ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=1.4;
  const L=PITCH.left,R=PITCH.right,T=PITCH.top,B=PITCH.bottom,cx=PITCH.cx,cy=PITCH.cy;
  ctx.strokeRect(L+0.5,T+0.5,R-L-1,B-T-1);
  line(cx,T,cx,B); circle(cx,cy,26); dot(cx,cy,1.6);
  strokeBox(L,cy-BOX_H/2,BOX_W,BOX_H); strokeBox(R-BOX_W,cy-BOX_H/2,BOX_W,BOX_H);
  strokeBox(L,cy-30,26,60); strokeBox(R-26,cy-30,26,60);
  dot(L+46,cy,1.4); dot(R-46,cy,1.4);
  arc(L+46,cy,20,-0.6,0.6); arc(R-46,cy,20,Math.PI-0.6,Math.PI+0.6);
  // corner arcs (real-pitch detail)
  arc(L,T,5,0,Math.PI/2); arc(R,T,5,Math.PI/2,Math.PI);
  arc(R,B,5,Math.PI,Math.PI*1.5); arc(L,B,5,Math.PI*1.5,Math.PI*2);
  drawGoal(L,'L'); drawGoal(R,'R');
  drawCornerFlags();
  drawDugouts();
}
function drawCornerFlags(){

    const flap=Math.floor(frames/9 + fx)%2;                              // flutter

function strokeBox(x,y,w,h){ ctx.strokeRect(Math.round(x)+0.5,Math.round(y)+0.5,w,h); }
function line(x1,y1,x2,y2){ ctx.beginPath(); ctx.moveTo(x1+0.5,y1); ctx.lineTo(x2+0.5,y2); ctx.stroke(); }
function circle(x,y,r){ ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke(); }

function drawGoal(x,side){
  const gt=goalTop(),gb=goalBot(),depth=GOAL_DEPTH;
  ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fillRect(side==='L'?x-depth:x,gt,depth,gb-gt);
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=0.8;
  const nx0=side==='L'?x-depth:x;
  for(let i=0;i<=depth;i+=3) line2(nx0+i,gt,nx0+i,gb);
  for(let j=gt;j<=gb;j+=4) line2(nx0,j,nx0+depth,j);
  // NET BULGE — the net billows out where the ball hit it
  if(goalBulge.side===side && goalBulge.t>0){
    const prog=Math.sin((1-goalBulge.t/24)*Math.PI), push=prog*8;
    const by=clamp(goalBulge.y,gt,gb), outx=side==='L'?-1:1;
    ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=1;
    for(let j=gt;j<=gb;j+=3){ const f=Math.max(0,1-Math.abs(j-by)/24);
      ctx.beginPath(); ctx.moveTo(nx0+(side==='L'?0:depth), j); ctx.lineTo(nx0+(side==='L'?0:depth)+outx*push*f, j); ctx.stroke(); }
  }
  ctx.fillStyle='#fff'; ctx.fillRect(x-1,gt-2,2,3); ctx.fillRect(x-1,gb-1,2,3); ctx.fillRect(x-1,gt,2,gb-gt);
}

function drawPlayer(p){

    ctx.globalAlpha= (p.superFx>0? 0.9 : (0.16 + p.charge*0.35)) * (p.controlled?1:0.8);

    ctx.beginPath(); ctx.ellipse(x,y+2,rr,rr*0.6,0,0,Math.PI*2); ctx.stroke();
    if(full){ ctx.globalAlpha=0.5+0.4*Math.sin(frames*0.3);
      ctx.beginPath(); ctx.ellipse(x,y+2,rr+2,(rr+2)*0.6,0,0,Math.PI*2); ctx.stroke(); }

  ctx.fillStyle=jr.sock; ctx.fillRect(x-3,y+5,2,2); ctx.fillRect(x+1,y+5,2,2);
  ctx.fillStyle=jr.shirt; ctx.fillRect(x-4,y-4,8,6);
  ctx.fillStyle=jr.shirt2; ctx.fillRect(x-4,y-1,8,1); ctx.fillRect(x-4,y-4,2,6);
  if(winner){        // arms punching the sky
    ctx.fillStyle=p.skin; ctx.fillRect(x-5,y-8,1,4); ctx.fillRect(x+4,y-8,1,4);
  } else if(loser){  // hands on head, gutted

    ctx.fillStyle=p.skin; ctx.fillRect(x-5,y-3+(legOff<0?1:0),1,3); ctx.fillRect(x+4,y-3+(legOff>0?1:0),1,3);

function drawGlitchLogo(cx, cy){
  const big=3;
  const t1='RETRO', t2='STRIKER';
  const w1=t1.length*4*big, w2=t2.length*4*big;
  const y2=cy+big*8+4;
  // glitch bursts: a couple of frames every ~1.5s + rare micro-bursts
  const burst = (titleT%92<6) || (titleT%233<3);
  const jx = burst? rint(-2,2):0, jy = burst? rint(-1,1):0;
  // chromatic aberration ghosts
  pixText(t1, cx-w1/2-1+jx, cy+jy, 'rgba(255,60,90,0.45)', big);
  pixText(t1, cx-w1/2+1+jx, cy-jy, 'rgba(60,220,255,0.45)', big);
  pixText(t2, cx-w2/2-1+jx, y2+jy, 'rgba(255,60,90,0.45)', big);
  pixText(t2, cx-w2/2+1+jx, y2-jy, 'rgba(60,220,255,0.45)', big);

  pixText(t1, cx-w1/2+1+jx, cy+2, '#0a2a1a', big);
  pixText(t1, cx-w1/2+jx, cy, '#39d98a', big);

  pixText(t2, cx-w2/2+jx, y2, '#ff5a3d', big);
  if(burst){
    // slice-shift bands of the logo region (classic VHS glitch)
    for(let i=0;i<3;i++){
      const sy=clamp(cy-3+rint(0,big*16+10),0,H-6);
      const bh=rint(2,4), off=rint(-7,7);
      const sx=Math.max(0,cx-120), sw=240;

      ctx.fillStyle = rnd()<0.5? '#39d98a':'#ff5a3d';
      ctx.fillRect(cx-115+rnd(230), cy-6+rnd(big*16+16), 2, 1);

  }

// ---- country select ----
function drawSelect(){

function drawLineup(){

    order.forEach((role,ri)=>{

      const ry=80+ri*22; const rowSlide=clamp((lineupT-6-ri*4)/12,0,1); const rox=(1-rowSlide)*(ti===0?-80:80);
      ctx.globalAlpha=rowSlide;

      ctx.fillStyle=T.c.kit.shirt; ctx.fillRect(x+rox+2,ry-1,12,12); ctx.fillStyle=T.c.kit.shirt2; ctx.fillRect(x+rox+2,ry+5,12,6);
      pixText(''+p.num, x+rox+8-(''+p.num).length*2, ry+1, '#ffffff',1);

// ---- PENALTY RENDER ----
function drawPkScene(){
  // cinematic focus: dim everything away from the duel while composing the kick
  if(pk && ['place','aim','power','cwind'].includes(pk.phase)){
    ctx.fillStyle='rgba(4,10,16,0.34)';
    ctx.fillRect(PITCH.left, PITCH.top, PK_SPOT_X()-56-PITCH.left, PITCH.bottom-PITCH.top);
  }
  if(pk && pk.sudden){   // sudden death: the air turns red
    ctx.fillStyle='rgba(255,60,60,'+(0.05+0.04*Math.sin(frames*0.1))+')';
    ctx.fillRect(PITCH.left,PITCH.top,PITCH.right-PITCH.left,PITCH.bottom-PITCH.top);
  }
  // ball trail
  for(const s of ballTrail){ ctx.globalAlpha=s.life/16; ctx.fillStyle='#fff'; ctx.fillRect(Math.round(s.x)-1,Math.round(s.y)-1,2,2); }
  ctx.globalAlpha=1;
  // actors
  drawShadow(pkShooter.x,pkShooter.y,pkShooter.r);
  drawShadow(pkKeeper.x,pkKeeper.y,pkKeeper.r);
  drawBallShadow();
  drawPlayer(pkKeeper);
  // keeper fist-pumps his save
  if(pk && pk.phase==='result' && pk.outcome==='save'){
    const kx=Math.round(pkKeeper.x), ky=Math.round(pkKeeper.y)-Math.round(Math.abs(Math.sin(frames*0.25))*2);
    ctx.fillStyle=pkKeeper.skin; ctx.fillRect(kx-5,ky-9,1,4); ctx.fillRect(kx+4,ky-9,1,4);
  }
  drawPlayer(pkShooter);
  drawBall();
  for(const pt of particles){ ctx.globalAlpha=clamp(pt.life/40,0,1); ctx.fillStyle=pt.c; ctx.fillRect(Math.round(pt.x),Math.round(pt.y),pt.s,pt.s); }
  ctx.globalAlpha=1;
  drawFloaters();

  if(!pk) return;
  // keeper dive motion streaks
  if(pk.phase==='fly' && Math.abs(pk.keeperToY-pk.keeperFromY)>4){
    const dirY = pk.keeperToY>pk.keeperFromY? -1 : 1;
    ctx.fillStyle='rgba(255,255,255,0.35)';
    for(let i=1;i<=3;i++) ctx.fillRect(Math.round(pkKeeper.x)-2, Math.round(pkKeeper.y)+dirY*i*4, 4, 1);
  }
  // aim reticle (sweeping)
  if(pk.phase==='aim'){
    const rx=PITCH.right-4, ty=Math.round(pk.aimY);
    ctx.fillStyle='#ffe84d';
    ctx.fillRect(rx-2,ty-4,5,1); ctx.fillRect(rx-2,ty+3,5,1);
    ctx.fillRect(rx-3,ty-3,1,6); ctx.fillRect(rx+3,ty-3,1,6);
    ctx.fillRect(rx,ty,1,1);
  }
  // locked-aim ghost while picking power / running up
  if((pk.phase==='power'||pk.phase==='run') && pk.lockedY!==null){
    const rx=PITCH.right-4, ty=Math.round(pk.lockedY);
    ctx.fillStyle='rgba(255,232,77,0.55)';
    ctx.fillRect(rx-2,ty-3,5,1); ctx.fillRect(rx-2,ty+2,5,1); ctx.fillRect(rx,ty-1,1,2);
  }
  // power bar
  if(pk.phase==='power'){
    const bx=W/2-40, by=H-34;
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx-2,by-2,84,10);
    const col=pk.power<0.5?'#39d98a':pk.power<0.85?'#ffd83d':'#ff5a3d';
    ctx.fillStyle=col; ctx.fillRect(bx,by,Math.round(80*pk.power),6);
    ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(bx-2.5,by-2.5,85,11);
    // sweet spot marker
    ctx.fillStyle='#fff'; ctx.fillRect(bx+Math.round(80*0.88),by-3,1,12);
    pixText('POWER', bx+28, by-12, '#cfe8f0',1);
  }
  // dive prompt + telegraph
  if(pk.phase==='cwind'){
    const t=pk.t;
    if(TUNE().pkTelegraph && t>18 && Math.floor(t/8)%2){
      const zy=PITCH.cy+pk.telegraphZone*23;
      pixText('▶', PITCH.right-30, zy-2, '#ff8a7a',1);
    }
    // dive selector UI
    const bx=W/2-52, by=H-38;
    pixText('DIVE:', bx, by, '#cfe8f0',1);
    const opts=[['↑ TOP',-1],['— STAY',0],['↓ LOW',1]];
    opts.forEach((o,i)=>{
      const ox=bx+28+i*30;
      const sel=pk.diveChoice===o[1];
      if(sel){ ctx.fillStyle='rgba(57,217,138,0.25)'; ctx.fillRect(ox-2,by-2,28,9); }
      pixText(o[0], ox, by, sel?'#39d98a':'#7a9aad',1);
    });
    // timer bar
    const w=Math.round(64*(1-t/64));
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(W/2-32,H-24,64,4);
    ctx.fillStyle='#ffd83d'; ctx.fillRect(W/2-32,H-24,w,4);
  }
}
function drawPkHUD(){
  if(!pk) return;
  const sy=pkScore(pk.youArr), sc=pkScore(pk.cpuArr);

  // dark sub-strip so pips/round/prompts never fight the crowd pixels
  ctx.fillStyle='rgba(8,16,26,0.92)'; ctx.fillRect(0,20,W,15);

  pixText(muted?'×':'♪', W-10,7, muted?'#8a9aa8':'#9fe8c0',1);
  // attempt pips
  const drawPips=(arr,x0)=>{
    for(let i=0;i<Math.max(5,arr.length);i++){

    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,H/2-30,W,56);
